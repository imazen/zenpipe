<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zenpipe Editor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a1a;
  --surface: #242424;
  --border: #333;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #4a9eff;
  --accent-dim: rgba(74, 158, 255, 0.3);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: grid;
  grid-template-columns: 1fr 280px;
  grid-template-rows: auto 1fr;
}

header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
#status { color: var(--text-dim); margin-left: auto; font-variant-numeric: tabular-nums; }

.btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 4px 12px; border-radius: 4px;
  cursor: pointer; font-size: 12px;
}
.btn:hover { border-color: var(--accent); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }

main {
  display: grid;
  grid-template-rows: 1fr auto;
  gap: 8px;
  padding: 8px;
  overflow: hidden;
}

#detail-wrap {
  position: relative; overflow: hidden; border-radius: 6px;
  background: #111; display: flex; align-items: center; justify-content: center;
}
#detail-canvas {
  image-rendering: auto; max-width: 100%; max-height: 100%; object-fit: contain;
}

.spinner-overlay {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; pointer-events: none; opacity: 0; transition: opacity 0.15s;
}
.spinner-overlay.active { opacity: 1; }
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#overview-wrap {
  position: relative; height: 120px; min-height: 80px; background: #111;
  border-radius: 6px; overflow: hidden; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
#overview-canvas {
  max-height: 100%; max-width: 100%; object-fit: contain;
  filter: blur(1px); transition: filter 0.2s;
}
#overview-canvas.sharp { filter: none; }

#region-selector {
  position: absolute; border: 2px solid var(--accent);
  background: var(--accent-dim); cursor: move; border-radius: 2px;
  min-width: 20px; min-height: 20px; touch-action: none;
}

aside {
  overflow-y: auto; padding: 12px; background: var(--surface);
  border-left: 1px solid var(--border); display: flex;
  flex-direction: column; gap: 2px;
}
.slider-group { padding: 6px 0; }
.slider-group h3 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-dim); margin-bottom: 4px; padding: 0 0 2px;
  border-bottom: 1px solid var(--border);
}
.slider-row {
  display: grid; grid-template-columns: 80px 1fr 36px;
  align-items: center; gap: 6px; height: 24px;
}
.slider-row label { font-size: 12px; color: var(--text-dim); cursor: pointer; }
.slider-row label:hover { color: var(--text); }
.slider-row input[type="range"] { width: 100%; accent-color: var(--accent); height: 4px; }
.slider-row .val {
  font-size: 11px; text-align: right; font-variant-numeric: tabular-nums;
  color: var(--text-dim);
}

#dropzone {
  grid-column: 1 / -1; grid-row: 2 / -1; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: var(--text-dim); font-size: 14px;
  overflow-y: auto;
}
#dropzone.hidden { display: none; }
#dropzone.dragover { background: var(--accent-dim); }
#editor-ui { display: contents; }
#editor-ui.hidden > * { display: none !important; }

/* ─── Export Modal ─── */
#export-modal-backdrop {
  display: none;
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#export-modal-backdrop.open { display: flex; }

#export-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 480px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

.export-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.export-header h2 { font-size: 15px; font-weight: 600; }
.export-header .export-dims {
  font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums;
}
.export-close-btn {
  background: none; border: none; color: var(--text-dim);
  font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1;
}
.export-close-btn:hover { color: var(--text); }

/* Format tabs */
.export-formats {
  display: flex; gap: 2px; padding: 12px 20px 0;
  flex-wrap: wrap;
}
.export-format-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 6px;
  background: transparent; border: 1px solid transparent;
  color: var(--text-dim); cursor: pointer; font-size: 12px;
  transition: all 0.15s;
}
.export-format-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.export-format-tab.active {
  background: var(--accent-dim); border-color: var(--accent);
  color: var(--text);
}
.export-format-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

/* Format controls area */
.export-body { padding: 16px 20px; }

.export-section {
  margin-bottom: 16px;
}
.export-section-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-dim); margin-bottom: 8px;
}

/* Slider control in modal */
.export-control {
  display: grid; grid-template-columns: 90px 1fr 44px;
  align-items: center; gap: 8px; height: 28px;
}
.export-control label {
  font-size: 12px; color: var(--text-dim);
}
.export-control input[type="range"] {
  width: 100%; accent-color: var(--accent); height: 4px;
}
.export-control .export-val {
  font-size: 11px; text-align: right; font-variant-numeric: tabular-nums;
  color: var(--text-dim);
}

/* Checkbox control */
.export-check {
  display: flex; align-items: center; gap: 8px;
  height: 28px; padding-left: 0;
}
.export-check input[type="checkbox"] {
  accent-color: var(--accent); width: 14px; height: 14px;
}
.export-check label {
  font-size: 12px; color: var(--text-dim); cursor: pointer;
}

/* Resize controls */
.export-resize-row {
  display: flex; align-items: center; gap: 8px;
}
.export-resize-row label {
  font-size: 12px; color: var(--text-dim); width: 50px;
}
.export-resize-input {
  width: 80px; padding: 4px 8px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-size: 12px;
  font-variant-numeric: tabular-nums;
}
.export-resize-input:focus { border-color: var(--accent); outline: none; }
.export-aspect-lock {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-dim); cursor: pointer; padding: 4px 6px; font-size: 14px;
  line-height: 1; transition: all 0.15s;
}
.export-aspect-lock.locked { color: var(--accent); border-color: var(--accent); }
.export-resize-px { font-size: 11px; color: var(--text-dim); margin-left: 4px; }

/* Estimates */
.export-estimates {
  display: flex; gap: 20px; padding: 12px 16px;
  background: var(--bg); border-radius: 6px; margin-bottom: 16px;
}
.export-estimate {
  display: flex; flex-direction: column; gap: 2px;
}
.export-estimate-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); }
.export-estimate-value { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }

/* Footer buttons */
.export-footer {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border);
}
.export-footer .btn { padding: 6px 16px; font-size: 13px; }
.export-footer .btn-primary { min-width: 120px; }
/* ── Picsum Photo Picker ── */
#sample-photos {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 8px; max-width: 720px; padding: 8px 0;
}
#sample-photos .photo-thumb {
  width: 120px; height: 90px; border-radius: 6px; cursor: pointer;
  border: 2px solid var(--border); object-fit: cover;
  transition: border-color 0.15s, transform 0.15s, opacity 0.3s;
  background: var(--surface); opacity: 0;
}
#sample-photos .photo-thumb.loaded { opacity: 1; }
#sample-photos .photo-thumb:hover {
  border-color: var(--accent); transform: scale(1.05);
}
#sample-photos .photo-thumb.loading-active {
  border-color: var(--accent); opacity: 0.6;
  animation: pulse-border 1s ease-in-out infinite;
}
@keyframes pulse-border {
  0%, 100% { border-color: var(--accent); }
  50% { border-color: var(--accent-dim); }
}
.picker-label {
  font-size: 12px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.5px; margin-top: 8px;
}
.picker-divider {
  width: 60px; height: 1px; background: var(--border); margin: 4px 0;
}

/* ── Film Preset Strip ── */
#preset-strip {
  padding: 8px 0 4px; border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
}
#preset-strip h3 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-dim); margin-bottom: 6px; padding: 0 0 2px;
  border-bottom: 1px solid var(--border);
}
#preset-chips {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.preset-chip {
  font-size: 10px; padding: 3px 7px; border-radius: 3px;
  cursor: pointer; border: 1.5px solid var(--border);
  background: var(--bg); color: var(--text-dim);
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  white-space: nowrap; line-height: 1.3;
}
.preset-chip:hover {
  border-color: var(--text-dim); color: var(--text);
}
.preset-chip.active {
  border-color: var(--accent); color: #fff;
  background: var(--accent-dim);
}
/* Category color accents via left border */
.preset-chip[data-cat="creative"]     { border-left: 3px solid #e06c9f; }
.preset-chip[data-cat="classic_neg"]  { border-left: 3px solid #d4a054; }
.preset-chip[data-cat="slide"]        { border-left: 3px solid #5cc462; }
.preset-chip[data-cat="motion"]       { border-left: 3px solid #7b8fe0; }
.preset-chip[data-cat="digital"]      { border-left: 3px solid #5cccd4; }
.preset-chip[data-cat="cinematic"]    { border-left: 3px solid #b06ce0; }
.preset-chip[data-cat="none"]         { border-left: 3px solid var(--text-dim); }
</style>
</head>
<body>

<header>
  <h1>zenpipe</h1>
  <button class="btn" id="open-btn">Open</button>
  <button class="btn" id="reset-btn">Reset</button>
  <button class="btn btn-primary" id="export-btn">Export</button>
  <span id="status">Drop an image to start</span>
</header>

<div id="dropzone">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M12 16V4M12 4l-4 4m4-4l4 4"/>
    <path d="M20 16v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/>
  </svg>
  <span>Drop an image here, or click Open</span>
  <input type="file" id="file-input" accept="image/*" hidden>
  <div class="picker-divider"></div>
  <span class="picker-label">or choose a sample photo</span>
  <div id="sample-photos"></div>
</div>

<div id="editor-ui" class="hidden">
  <main>
    <div id="detail-wrap">
      <canvas id="detail-canvas"></canvas>
      <div class="spinner-overlay" id="detail-spinner"><div class="spinner"></div></div>
    </div>
    <div id="overview-wrap">
      <canvas id="overview-canvas"></canvas>
      <div id="region-selector"></div>
      <div class="spinner-overlay" id="overview-spinner"><div class="spinner"></div></div>
    </div>
  </main>
  <aside id="sidebar">
    <div id="preset-strip">
      <h3>Film Preset</h3>
      <div id="preset-chips"><!-- Generated by JS --></div>
    </div>
    <!-- Slider groups generated from schema -->
  </aside>
</div>

<!-- Export Modal -->
<div id="export-modal-backdrop">
  <div id="export-modal">
    <div class="export-header">
      <div>
        <h2>Export Image</h2>
        <div class="export-dims" id="export-dims"></div>
      </div>
      <button class="export-close-btn" id="export-close" aria-label="Close">&times;</button>
    </div>

    <div class="export-formats" id="export-format-tabs"></div>

    <div class="export-body">
      <div class="export-section" id="export-format-controls"></div>

      <div class="export-section">
        <div class="export-section-label">Output Size</div>
        <div class="export-resize-row" style="margin-bottom: 6px;">
          <label for="export-width">Width</label>
          <input type="number" class="export-resize-input" id="export-width" min="1" max="32000">
          <button class="export-aspect-lock locked" id="export-aspect-lock" title="Lock aspect ratio">&#x1f512;</button>
          <label for="export-height">Height</label>
          <input type="number" class="export-resize-input" id="export-height" min="1" max="32000">
          <span class="export-resize-px" id="export-megapixels"></span>
        </div>
      </div>

      <div class="export-estimates">
        <div class="export-estimate">
          <span class="export-estimate-label">Est. Time</span>
          <span class="export-estimate-value" id="export-est-time">--</span>
        </div>
        <div class="export-estimate">
          <span class="export-estimate-label">Est. Size</span>
          <span class="export-estimate-value" id="export-est-size">--</span>
        </div>
      </div>
    </div>

    <div class="export-footer">
      <button class="btn" id="export-cancel">Cancel</button>
      <button class="btn btn-primary" id="export-confirm">Export JPEG</button>
    </div>
  </div>
</div>

<script>
// =====================================================================
// Constants & State
// =====================================================================

const OVERVIEW_MAX = 512;
const DETAIL_MAX = 800;

let worker = null;
let nextMsgId = 0;
const pending = new Map();  // id → { resolve, reject }

let sourceImage = null;
let sourceWidth = 0, sourceHeight = 0;
let region = { x: 0.25, y: 0.25, w: 0.5, h: 0.5 };
const adjustments = {};
let filmPreset = null;  // Current film preset id or null
let sliderNodes = [];  // Populated from schema
let overviewRenderId = 0, detailRenderId = 0;

const $ = id => document.getElementById(id);

// =====================================================================
// Worker Communication
// =====================================================================

function initWorker() {
  worker = new Worker('worker.js');
  worker.addEventListener('message', e => {
    const msg = e.data;
    const p = pending.get(msg.id);
    if (!p) return;
    pending.delete(msg.id);
    if (msg.type === 'error') p.reject(new Error(msg.message));
    else p.resolve(msg);
  });
}

function sendToWorker(type, data) {
  const id = nextMsgId++;
  return new Promise((resolve, reject) => {
    pending.set(id, { resolve, reject });
    const msg = { id, type, ...data };
    // Transfer ArrayBuffer if present
    const transfer = [];
    if (data?.data instanceof ArrayBuffer) transfer.push(data.data);
    if (data?.data instanceof Uint8Array) transfer.push(data.data.buffer);
    worker.postMessage(msg, transfer);
  });
}

// =====================================================================
// CSS Filter Approximation
// =====================================================================

const CSS_FILTER_MAP = {
  'zenfilters.exposure': (v) => v ? `brightness(${Math.pow(2, v).toFixed(3)})` : null,
  'zenfilters.contrast': (v) => v ? `contrast(${(1 + v).toFixed(3)})` : null,
  'zenfilters.saturation': (v) => v ? `saturate(${v.toFixed(3)})` : null,  // factor, not offset
};

function toCssFilter() {
  const parts = [];
  for (const node of sliderNodes) {
    const mapper = CSS_FILTER_MAP[node.id];
    if (!mapper) continue;
    for (const param of node.params) {
      const v = adjustments[param.adjustKey];
      if (v === undefined || v === param.identity) continue;
      const css = mapper(v);
      if (css) parts.push(css);
    }
  }
  return parts.length ? parts.join(' ') : 'none';
}

function applyCssPreview() {
  const f = toCssFilter();
  $('overview-canvas').style.filter = f;
  $('detail-canvas').style.filter = f;
}

function clearCssPreview() {
  $('overview-canvas').style.filter = 'none';
  $('detail-canvas').style.filter = 'none';
}

// =====================================================================
// Schema-Driven Sidebar Generation
// =====================================================================

/** Group display order and labels. */
const GROUP_ORDER = [
  'tone', 'tone_range', 'color', 'detail', 'effects',
  'local', 'creative', 'lens', 'auto',
];
const GROUP_LABELS = {
  tone: 'Tone', tone_range: 'Tone Range', color: 'Color',
  detail: 'Detail', effects: 'Effects', local: 'Local',
  creative: 'Creative', lens: 'Lens', auto: 'Auto',
};

/** Curated list of nodes to show (ordered). Others are hidden. */
const VISIBLE_NODES = [
  'zenfilters.exposure', 'zenfilters.contrast',
  'zenfilters.highlights_shadows',
  'zenfilters.saturation', 'zenfilters.vibrance', 'zenfilters.temperature', 'zenfilters.tint',
  'zenfilters.clarity', 'zenfilters.sharpen',
  'zenfilters.dehaze', 'zenfilters.vignette',
  'zenfilters.black_point', 'zenfilters.white_point',
  'zenfilters.auto_levels', 'zenfilters.auto_exposure',
];

async function loadSchemaAndBuildUI() {
  let schema;
  try {
    const resp = await fetch('schema.json');
    schema = await resp.json();
  } catch {
    const errP = document.createElement('p');
    errP.style.cssText = 'color:var(--text-dim);padding:8px';
    errP.textContent = 'Failed to load schema';
    $('sidebar').appendChild(errP);
    return;
  }

  const defs = schema.$defs || {};
  const sidebar = $('sidebar');
  // Remove old slider groups but preserve the preset strip
  sidebar.querySelectorAll('.slider-group').forEach(el => el.remove());

  // Group nodes by x-zennode-group
  const groups = new Map();
  for (const nodeId of VISIBLE_NODES) {
    const def = defs[nodeId];
    if (!def) continue;
    const group = def['x-zennode-group'] || 'other';
    if (!groups.has(group)) groups.set(group, []);

    const params = [];
    for (const [paramName, paramSchema] of Object.entries(def.properties || {})) {
      if (paramSchema.type !== 'number' && paramSchema.type !== 'integer') continue;
      const min = paramSchema.minimum ?? 0;
      const max = paramSchema.maximum ?? 1;
      const step = paramSchema['x-zennode-step'] ?? 0.05;
      const defaultVal = paramSchema.default ?? 0;
      const identity = paramSchema['x-zennode-identity'] ?? defaultVal;
      const label = paramSchema.title || paramName;
      const adjustKey = nodeId.replace('zenfilters.', '') + (params.length > 0 ? '_' + paramName : '');

      adjustments[adjustKey] = identity;
      params.push({ paramName, label, min, max, step, defaultVal, identity, adjustKey });
    }

    if (params.length > 0) {
      groups.get(group).push({
        id: nodeId,
        title: def.title || nodeId,
        params,
      });
    }
  }

  // Render groups in order
  for (const groupKey of GROUP_ORDER) {
    const nodes = groups.get(groupKey);
    if (!nodes || nodes.length === 0) continue;

    const groupEl = document.createElement('div');
    groupEl.className = 'slider-group';
    groupEl.innerHTML = `<h3>${GROUP_LABELS[groupKey] || groupKey}</h3>`;

    for (const node of nodes) {
      sliderNodes.push(node);
      for (const param of node.params) {
        const row = document.createElement('div');
        row.className = 'slider-row';
        row.innerHTML = `
          <label title="${node.title}: ${param.paramName}">${param.label}</label>
          <input type="range" min="${param.min}" max="${param.max}"
                 step="${param.step}" value="${param.identity}"
                 data-key="${param.adjustKey}" data-identity="${param.identity}">
          <span class="val">${formatVal(param.identity)}</span>
        `;
        const slider = row.querySelector('input');
        const display = row.querySelector('.val');

        slider.addEventListener('input', () => {
          adjustments[param.adjustKey] = parseFloat(slider.value);
          display.textContent = formatVal(adjustments[param.adjustKey]);
          scheduleRender();
        });

        // Double-click to reset
        slider.addEventListener('dblclick', () => {
          slider.value = param.identity;
          adjustments[param.adjustKey] = param.identity;
          display.textContent = formatVal(param.identity);
          scheduleRender();
        });

        groupEl.appendChild(row);
      }
    }
    sidebar.appendChild(groupEl);
  }
}

function formatVal(v) {
  return Math.abs(v) >= 10 ? v.toFixed(0) : v.toFixed(2);
}

// =====================================================================
// Rendering
// =====================================================================

function getFilterAdjustments() {
  // Map adjustKeys back to the short names the worker expects
  const adj = {};
  for (const [key, val] of Object.entries(adjustments)) {
    // Find identity for this key
    let identity = 0;
    for (const node of sliderNodes) {
      for (const p of node.params) {
        if (p.adjustKey === key) { identity = p.identity; break; }
      }
    }
    if (val !== identity) adj[key] = val;
  }
  return adj;
}

async function renderOverview() {
  if (!sourceImage) return;
  const id = ++overviewRenderId;
  $('overview-spinner').classList.add('active');

  try {
    const result = await sendToWorker('overview', {
      adjustments: getFilterAdjustments(),
      maxDim: OVERVIEW_MAX,
      film_preset: filmPreset,
    });
    if (id !== overviewRenderId) return; // superseded
    const canvas = $('overview-canvas');
    canvas.width = result.width;
    canvas.height = result.height;
    const ctx = canvas.getContext('2d');
    // result.pixels is a Uint8Array transferred from the worker.
    // Reconstruct as Uint8ClampedArray for ImageData.
    const px = result.pixels;
    const expected = result.width * result.height * 4;
    if (!px || px.byteLength !== expected) {
      console.error(`Overview pixel mismatch: got ${px?.byteLength}, expected ${expected}, type=${px?.constructor?.name}`);
    }
    const clamped = new Uint8ClampedArray(px.buffer, px.byteOffset, expected);
    const imgData = new ImageData(clamped, result.width, result.height);
    ctx.putImageData(imgData, 0, 0);
    canvas.classList.add('sharp');
  } catch (e) {
    console.error('Overview render failed:', e);
    $('status').textContent = `Overview error: ${e.message}`;
  }
  $('overview-spinner').classList.remove('active');
  clearCssPreview();
  updateRegionSelector();
}

async function renderDetail() {
  if (!sourceImage) return;
  const id = ++detailRenderId;
  $('detail-spinner').classList.add('active');

  try {
    const result = await sendToWorker('region', {
      adjustments: getFilterAdjustments(),
      rect: region,
      maxDim: DETAIL_MAX,
      film_preset: filmPreset,
    });
    if (id !== detailRenderId) return;
    const canvas = $('detail-canvas');
    canvas.width = result.width;
    canvas.height = result.height;
    const ctx = canvas.getContext('2d');
    const imgData = new ImageData(new Uint8ClampedArray(result.pixels.buffer), result.width, result.height);
    ctx.putImageData(imgData, 0, 0);
  } catch (e) {
    console.error('Detail render failed:', e);
    $('status').textContent = `Detail error: ${e.message}`;
  }
  $('detail-spinner').classList.remove('active');
  clearCssPreview();
}

let renderDebounceId = null;
const RENDER_DEBOUNCE_MS = 50; // Wait for slider to settle

function scheduleRender() {
  applyCssPreview();
  $('overview-canvas').classList.remove('sharp');
  // Debounce: wait for slider activity to pause before dispatching to worker.
  // CSS preview is instant; worker render waits for the slider to settle.
  if (renderDebounceId) clearTimeout(renderDebounceId);
  renderDebounceId = setTimeout(() => {
    renderDebounceId = null;
    // Bump version IDs — any in-flight renders will be discarded on arrival.
    renderOverview();
    renderDetail();
  }, RENDER_DEBOUNCE_MS);
}

function scheduleDetailOnly() {
  $('detail-spinner').classList.add('active');
  if (renderDebounceId) clearTimeout(renderDebounceId);
  renderDebounceId = setTimeout(() => {
    renderDebounceId = null;
    renderDetail();
  }, RENDER_DEBOUNCE_MS);
}

// =====================================================================
// Region Selector
// =====================================================================

function updateRegionSelector() {
  const canvas = $('overview-canvas');
  const rect = canvas.getBoundingClientRect();
  const wrap = $('overview-wrap').getBoundingClientRect();
  const cx = rect.left - wrap.left;
  const cy = rect.top - wrap.top;
  const sel = $('region-selector');
  sel.style.left = (cx + region.x * rect.width) + 'px';
  sel.style.top = (cy + region.y * rect.height) + 'px';
  sel.style.width = (region.w * rect.width) + 'px';
  sel.style.height = (region.h * rect.height) + 'px';
}

(function() {
  let dragging = false, startX, startY, startRX, startRY;
  const sel = $('region-selector');

  sel.addEventListener('pointerdown', e => {
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startRX = region.x; startRY = region.y;
    sel.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    const rect = $('overview-canvas').getBoundingClientRect();
    region.x = Math.max(0, Math.min(1 - region.w, startRX + (e.clientX - startX) / rect.width));
    region.y = Math.max(0, Math.min(1 - region.h, startRY + (e.clientY - startY) / rect.height));
    updateRegionSelector();
    scheduleDetailOnly();
  });

  window.addEventListener('pointerup', () => { dragging = false; });
})();

$('overview-wrap').addEventListener('click', e => {
  if (e.target === $('region-selector')) return;
  const rect = $('overview-canvas').getBoundingClientRect();
  const nx = (e.clientX - rect.left) / rect.width;
  const ny = (e.clientY - rect.top) / rect.height;
  region.x = Math.max(0, Math.min(1 - region.w, nx - region.w / 2));
  region.y = Math.max(0, Math.min(1 - region.h, ny - region.h / 2));
  updateRegionSelector();
  scheduleDetailOnly();
});

new ResizeObserver(() => updateRegionSelector()).observe($('overview-wrap'));

// =====================================================================
// File Loading
// =====================================================================

async function loadImage(file) {
  $('status').textContent = 'Loading...';

  // Send raw bytes to worker for decoding
  const buffer = await file.arrayBuffer();
  const result = await sendToWorker('init', { data: buffer });

  sourceWidth = result.width;
  sourceHeight = result.height;
  sourceImage = true;
  const be = result.backend === 'wasm' ? 'WASM' : 'mock';

  // Set initial region
  const aspect = sourceWidth / sourceHeight;
  region = aspect > 1
    ? { x: 0.25, y: 0.1, w: 0.5, h: 0.8 }
    : { x: 0.1, y: 0.25, w: 0.8, h: 0.5 };

  $('dropzone').classList.add('hidden');
  $('editor-ui').classList.remove('hidden');
  $('status').textContent = `${sourceWidth}\u00d7${sourceHeight} \u2014 ${file.name} [${be}]`;

  renderOverview();
  renderDetail();
}

$('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadImage(e.target.files[0]);
});
$('open-btn').addEventListener('click', () => $('file-input').click());

document.addEventListener('dragover', e => { e.preventDefault(); $('dropzone').classList.add('dragover'); });
document.addEventListener('dragleave', () => $('dropzone').classList.remove('dragover'));
document.addEventListener('drop', e => {
  e.preventDefault();
  $('dropzone').classList.remove('dragover');
  const file = e.dataTransfer?.files[0];
  if (file?.type.startsWith('image/')) loadImage(file);
});

// Reset all sliders to identity and clear film preset
$('reset-btn').addEventListener('click', () => {
  for (const row of document.querySelectorAll('.slider-row')) {
    const slider = row.querySelector('input');
    const display = row.querySelector('.val');
    const identity = parseFloat(slider.dataset.identity);
    slider.value = identity;
    adjustments[slider.dataset.key] = identity;
    display.textContent = formatVal(identity);
  }
  setActivePreset(null);
  scheduleRender();
});

// =====================================================================
// Export Modal
// =====================================================================

const EXPORT_FORMATS = [
  { id: 'jpeg', label: 'JPEG', ext: 'jpg', mime: 'image/jpeg', color: '#f59e0b' },
  { id: 'webp', label: 'WebP', ext: 'webp', mime: 'image/webp', color: '#10b981' },
  { id: 'png',  label: 'PNG',  ext: 'png',  mime: 'image/png',  color: '#6366f1' },
  { id: 'avif', label: 'AVIF', ext: 'avif', mime: 'image/avif', color: '#ef4444' },
  { id: 'jxl',  label: 'JXL',  ext: 'jxl',  mime: 'image/jxl',  color: '#8b5cf6' },
  { id: 'gif',  label: 'GIF',  ext: 'gif',  mime: 'image/gif',  color: '#ec4899' },
];

const FORMAT_CONTROLS = {
  jpeg: [
    { type: 'range', key: 'quality', label: 'Quality', min: 1, max: 100, default: 85, unit: '' },
    { type: 'checkbox', key: 'progressive', label: 'Progressive', default: false },
  ],
  webp: [
    { type: 'range', key: 'quality', label: 'Quality', min: 1, max: 100, default: 80, unit: '' },
    { type: 'checkbox', key: 'lossless', label: 'Lossless', default: false },
  ],
  png: [
    { type: 'range', key: 'compression', label: 'Compression', min: 1, max: 9, default: 6, unit: '' },
    { type: 'checkbox', key: 'interlace', label: 'Interlace', default: false },
  ],
  avif: [
    { type: 'range', key: 'quality', label: 'Quality', min: 1, max: 100, default: 65, unit: '' },
    { type: 'range', key: 'speed', label: 'Speed', min: 1, max: 10, default: 6, unit: '' },
    { type: 'checkbox', key: 'lossless', label: 'Lossless', default: false },
  ],
  jxl: [
    { type: 'range', key: 'quality', label: 'Quality', min: 1, max: 100, default: 75, unit: '' },
    { type: 'range', key: 'effort', label: 'Effort', min: 1, max: 9, default: 7, unit: '' },
    { type: 'checkbox', key: 'lossless', label: 'Lossless', default: false },
  ],
  gif: [
    { type: 'range', key: 'colors', label: 'Colors', min: 2, max: 256, default: 256, unit: '' },
    { type: 'checkbox', key: 'dither', label: 'Dither', default: true },
  ],
};

// bytes per pixel at default quality/settings
const BPP_ESTIMATES = {
  jpeg: 0.5, webp: 0.3, png: 1.5, avif: 0.2, jxl: 0.25, gif: 0.8,
};

// ms per 1000 pixels at default settings
const TIME_PER_KPIX = {
  jpeg: 0.5, webp: 0.5, png: 0.5, avif: 5, jxl: 3, gif: 2,
};

let exportFormat = 'jpeg';
let exportAspectLocked = true;
let exportWidth = 0, exportHeight = 0;
const exportSettings = {}; // format → { key: value }

// Initialize default settings for each format
for (const fmt of EXPORT_FORMATS) {
  exportSettings[fmt.id] = {};
  for (const ctrl of FORMAT_CONTROLS[fmt.id]) {
    exportSettings[fmt.id][ctrl.key] = ctrl.default;
  }
}

function openExportModal() {
  if (!sourceImage) return;

  exportWidth = sourceWidth;
  exportHeight = sourceHeight;

  // Populate format tabs
  const tabsEl = $('export-format-tabs');
  tabsEl.innerHTML = '';
  for (const fmt of EXPORT_FORMATS) {
    const tab = document.createElement('button');
    tab.className = 'export-format-tab' + (fmt.id === exportFormat ? ' active' : '');
    tab.dataset.format = fmt.id;
    tab.innerHTML = `<span class="export-format-dot" style="background:${fmt.color}"></span>${fmt.label}`;
    tab.addEventListener('click', () => selectExportFormat(fmt.id));
    tabsEl.appendChild(tab);
  }

  updateExportDims();
  renderFormatControls();
  updateExportEstimates();

  $('export-modal-backdrop').classList.add('open');
}

function closeExportModal() {
  $('export-modal-backdrop').classList.remove('open');
}

function selectExportFormat(formatId) {
  exportFormat = formatId;

  // Update tab active state
  for (const tab of $('export-format-tabs').children) {
    tab.classList.toggle('active', tab.dataset.format === formatId);
  }

  // Update confirm button text
  const fmt = EXPORT_FORMATS.find(f => f.id === formatId);
  $('export-confirm').textContent = `Export ${fmt.label}`;

  renderFormatControls();
  updateExportEstimates();
}

function renderFormatControls() {
  const container = $('export-format-controls');
  container.innerHTML = '<div class="export-section-label">Format Settings</div>';

  const controls = FORMAT_CONTROLS[exportFormat];
  const settings = exportSettings[exportFormat];

  for (const ctrl of controls) {
    if (ctrl.type === 'range') {
      const row = document.createElement('div');
      row.className = 'export-control';
      row.innerHTML = `
        <label>${ctrl.label}</label>
        <input type="range" min="${ctrl.min}" max="${ctrl.max}" step="1"
               value="${settings[ctrl.key]}" data-key="${ctrl.key}">
        <span class="export-val">${settings[ctrl.key]}</span>
      `;
      const slider = row.querySelector('input');
      const valSpan = row.querySelector('.export-val');
      slider.addEventListener('input', () => {
        settings[ctrl.key] = parseInt(slider.value);
        valSpan.textContent = slider.value;
        updateExportEstimates();
      });
      container.appendChild(row);
    } else if (ctrl.type === 'checkbox') {
      const row = document.createElement('div');
      row.className = 'export-check';
      const id = `export-chk-${ctrl.key}`;
      row.innerHTML = `
        <input type="checkbox" id="${id}" ${settings[ctrl.key] ? 'checked' : ''} data-key="${ctrl.key}">
        <label for="${id}">${ctrl.label}</label>
      `;
      const chk = row.querySelector('input');
      chk.addEventListener('change', () => {
        settings[ctrl.key] = chk.checked;
        updateExportEstimates();
      });
      container.appendChild(row);
    }
  }
}

function updateExportDims() {
  const mp = (exportWidth * exportHeight / 1e6).toFixed(1);
  $('export-dims').textContent = `${exportWidth} \u00d7 ${exportHeight} (${mp} MP)`;
  $('export-width').value = exportWidth;
  $('export-height').value = exportHeight;
  $('export-megapixels').textContent = `${mp} MP`;
}

function updateExportEstimates() {
  const pixels = exportWidth * exportHeight;
  const kpix = pixels / 1000;
  const settings = exportSettings[exportFormat];

  // Time estimate
  let baseTime = TIME_PER_KPIX[exportFormat] * kpix;
  // Apply effort/speed factor for relevant formats
  if (exportFormat === 'jxl' && settings.effort) {
    baseTime *= settings.effort / 7;
  }
  if (exportFormat === 'avif' && settings.speed) {
    // Lower speed = slower encoding
    baseTime *= (11 - settings.speed) / 5;
  }
  $('export-est-time').textContent = formatTime(baseTime);

  // Size estimate
  let bpp = BPP_ESTIMATES[exportFormat];
  // Adjust for quality
  if (settings.quality !== undefined) {
    bpp *= settings.quality / 75; // normalize around a mid-point
  }
  if (settings.lossless) {
    bpp *= 3; // lossless is much bigger
  }
  if (exportFormat === 'gif' && settings.colors !== undefined) {
    bpp *= settings.colors / 256;
  }
  const sizeBytes = pixels * bpp;
  $('export-est-size').textContent = formatSize(sizeBytes);
}

function formatTime(ms) {
  if (ms < 1000) return '< 1s';
  if (ms < 10000) return `~${Math.round(ms / 1000)}s`;
  if (ms < 60000) return `~${Math.round(ms / 1000)}s`;
  return `~${(ms / 60000).toFixed(1)}m`;
}

function formatSize(bytes) {
  if (bytes < 1024) return `${Math.round(bytes)} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(0)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

// Aspect ratio lock
$('export-aspect-lock').addEventListener('click', () => {
  exportAspectLocked = !exportAspectLocked;
  const btn = $('export-aspect-lock');
  btn.classList.toggle('locked', exportAspectLocked);
  btn.innerHTML = exportAspectLocked ? '&#x1f512;' : '&#x1f513;';
});

// Width/Height linked inputs
$('export-width').addEventListener('input', () => {
  const w = parseInt($('export-width').value) || 1;
  exportWidth = Math.max(1, Math.min(32000, w));
  if (exportAspectLocked && sourceWidth > 0) {
    exportHeight = Math.round(exportWidth * sourceHeight / sourceWidth);
    $('export-height').value = exportHeight;
  }
  updateExportDims();
  updateExportEstimates();
});

$('export-height').addEventListener('input', () => {
  const h = parseInt($('export-height').value) || 1;
  exportHeight = Math.max(1, Math.min(32000, h));
  if (exportAspectLocked && sourceHeight > 0) {
    exportWidth = Math.round(exportHeight * sourceWidth / sourceHeight);
    $('export-width').value = exportWidth;
  }
  updateExportDims();
  updateExportEstimates();
});

// Close modal
$('export-close').addEventListener('click', closeExportModal);
$('export-cancel').addEventListener('click', closeExportModal);
$('export-modal-backdrop').addEventListener('click', (e) => {
  if (e.target === $('export-modal-backdrop')) closeExportModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && $('export-modal-backdrop').classList.contains('open')) {
    closeExportModal();
  }
});

// Open modal from header button
$('export-btn').addEventListener('click', () => openExportModal());

// Perform export
$('export-confirm').addEventListener('click', async () => {
  if (!sourceImage) return;
  closeExportModal();

  const fmt = EXPORT_FORMATS.find(f => f.id === exportFormat);
  const settings = exportSettings[exportFormat];

  $('status').textContent = `Exporting ${fmt.label}...`;
  try {
    const exportData = {
      adjustments: getFilterAdjustments(),
      format: exportFormat,
      quality: settings.quality || 85,
    };
    // Pass resize dimensions if different from source
    if (exportWidth !== sourceWidth || exportHeight !== sourceHeight) {
      exportData.width = exportWidth;
      exportData.height = exportHeight;
    }
    // Pass format-specific options
    for (const [key, val] of Object.entries(settings)) {
      if (key !== 'quality') exportData[key] = val;
    }

    const result = await sendToWorker('export', exportData);

    // Determine MIME type (worker may only support jpeg/png via canvas)
    const mime = (exportFormat === 'png') ? 'image/png' : 'image/jpeg';
    const ext = (exportFormat === 'png') ? 'png' : fmt.ext;

    const blob = new Blob([result.data], { type: mime });
      format: 'jpeg',
      quality: 90,
      film_preset: filmPreset,
    });
    const blob = new Blob([result.data], { type: 'image/jpeg' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `export.${ext}`;
    a.click();
    URL.revokeObjectURL(url);
    $('status').textContent = `Exported ${fmt.label} ${(result.size / 1024).toFixed(0)} KB`;
  } catch (e) {
    $('status').textContent = `Export error: ${e.message}`;
  }
});

const PICSUM_IDS = [10, 11, 15, 17, 24, 28, 29, 36, 37, 39, 40, 42];

function buildPhotoPicker() {
  const container = $('sample-photos');
  for (const pid of PICSUM_IDS) {
    const img = document.createElement('img');
    img.className = 'photo-thumb';
    img.src = `https://picsum.photos/id/${pid}/200/150`;
    img.alt = `Sample photo ${pid}`;
    img.dataset.picsumId = pid;
    img.addEventListener('load', () => img.classList.add('loaded'));
    img.addEventListener('click', () => loadPicsumPhoto(pid, img));
    container.appendChild(img);
  }
}

async function loadPicsumPhoto(pid, thumbEl) {
  // Mark the clicked thumb as loading
  const allThumbs = document.querySelectorAll('.photo-thumb');
  allThumbs.forEach(t => t.classList.remove('loading-active'));
  thumbEl.classList.add('loading-active');
  $('status').textContent = `Loading sample photo ${pid}...`;

  try {
    const resp = await fetch(`https://picsum.photos/id/${pid}/1920/1280`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const buffer = await resp.arrayBuffer();

    // Pass to worker the same way as file upload
    const result = await sendToWorker('init', { data: buffer });

    sourceWidth = result.width;
    sourceHeight = result.height;
    sourceImage = true;
    const be = result.backend === 'wasm' ? 'WASM' : 'mock';

    // Set initial region
    const aspect = sourceWidth / sourceHeight;
    region = aspect > 1
      ? { x: 0.25, y: 0.1, w: 0.5, h: 0.8 }
      : { x: 0.1, y: 0.25, w: 0.8, h: 0.5 };

    $('dropzone').classList.add('hidden');
    $('editor-ui').classList.remove('hidden');
    $('status').textContent = `${sourceWidth}\u00d7${sourceHeight} \u2014 picsum/${pid} [${be}]`;

    renderOverview();
    renderDetail();
  } catch (e) {
    $('status').textContent = `Failed to load photo: ${e.message}`;
    console.error('Picsum load failed:', e);
  }
  thumbEl.classList.remove('loading-active');
}
