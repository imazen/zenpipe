<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- coi-serviceworker.js: enable when SharedArrayBuffer is needed (wasm-bindgen-rayon) -->
<!-- Disabled: COEP blocks cross-origin resources (picsum, etc.) -->
<!-- <script src="coi-serviceworker.js"></script> -->
<title>zenpipe Editor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a1a;
  --surface: #242424;
  --border: #333;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #4a9eff;
  --accent-dim: rgba(74, 158, 255, 0.3);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: grid;
  grid-template-columns: 1fr 280px;
  grid-template-rows: auto 1fr;
}

header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  position: relative;
}
header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
#status { color: var(--text-dim); margin-left: auto; font-variant-numeric: tabular-nums; }

.btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 4px 12px; border-radius: 4px;
  cursor: pointer; font-size: 12px;
}
.btn:hover { border-color: var(--accent); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }

main {
  display: grid;
  grid-template-rows: 1fr;
  padding: 8px;
  overflow: hidden;
}

#detail-wrap {
  position: relative; overflow: hidden; border-radius: 6px;
  background: #111; display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
#detail-canvas {
  image-rendering: auto; max-width: 100%; max-height: calc(100% - 24px); object-fit: contain;
  touch-action: none;
}
#pixel-info {
  color: var(--text-dim); text-align: center;
  padding: 4px 12px; cursor: pointer; user-select: none;
  background: rgba(0, 0, 0, 0.5); border-radius: 4px;
  margin-top: 2px; flex-shrink: 0;
  font-variant-numeric: tabular-nums;
  transition: color 0.15s;
  display: none;
  align-items: baseline; justify-content: center; gap: 8px;
}
#pixel-info:hover { color: var(--text); }
.ratio-text {
  font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
}
.ratio-exact { color: #4ade80; }
.ratio-down { color: var(--text); }
.ratio-up { color: #fb923c; }
.ratio-up-warn { color: #ef4444; }
.ratio-dims { font-size: 11px; color: var(--text-dim); }
.loading-message {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 28px; font-weight: 500;
  color: var(--text-dim); letter-spacing: 0.5px; pointer-events: none;
  opacity: 0; transition: opacity 0.2s;
  z-index: 5;
}
.loading-message.active { opacity: 1; }

.spinner-overlay {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; pointer-events: none; opacity: 0; transition: opacity 0.15s;
}
.spinner-overlay.active { opacity: 1; }
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#overview-wrap {
  position: absolute; bottom: 36px; left: 8px; z-index: 6;
  width: 180px; height: 135px;
  background: rgba(0,0,0,0.7); border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden; display: flex;
  align-items: center; justify-content: center;
  backdrop-filter: blur(2px);
  transition: opacity 0.2s, transform 0.2s;
}
#overview-wrap.collapsed {
  opacity: 0; pointer-events: none; transform: scale(0.8);
}
#minimap-toggle {
  position: absolute; bottom: 8px; left: 8px; z-index: 7;
  background: rgba(0,0,0,0.5); border: 1px solid var(--border);
  color: var(--text-dim); padding: 2px 8px; border-radius: 3px;
  font-size: 10px; cursor: pointer;
}
#minimap-toggle:hover { color: var(--text); border-color: var(--accent); }
/* When minimap is visible, move toggle above it */
#overview-wrap:not(.collapsed) ~ #minimap-toggle,
#detail-wrap:has(#overview-wrap:not(.collapsed)) > #minimap-toggle {
  bottom: 178px;
}
#overview-canvas {
  max-height: 100%; max-width: 100%; object-fit: contain; border-radius: 4px;
  filter: blur(1px); transition: filter 0.2s;
}
#overview-canvas.sharp { filter: none; }

#region-selector {
  position: absolute; border: 2px solid var(--accent);
  background: var(--accent-dim); cursor: move; border-radius: 2px;
  min-width: 20px; min-height: 20px; touch-action: none;
}
#region-selector.hidden { display: none; }

/* Toggle button for crop window */
#crop-toggle {
  position: absolute; top: 4px; right: 4px; z-index: 5;
  background: rgba(0,0,0,0.5); border: 1px solid var(--border);
  color: var(--text-dim); padding: 2px 6px; border-radius: 3px;
  font-size: 10px; cursor: pointer;
}
#crop-toggle:hover { color: var(--text); border-color: var(--accent); }

aside {
  overflow-y: auto; padding: 12px; background: var(--surface);
  border-left: 1px solid var(--border); display: flex;
  flex-direction: column; gap: 2px;
}

/* Reset button in sidebar */
#reset-btn {
  width: 100%; padding: 6px 12px; margin-bottom: 6px;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text-dim); border-radius: 4px; cursor: pointer;
  font-size: 12px; transition: border-color 0.15s, color 0.15s;
}
#reset-btn:hover { border-color: var(--accent); color: var(--text); }

.slider-group { padding: 6px 0; }
.slider-group h3 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-dim); margin-bottom: 4px; padding: 0 0 2px;
  border-bottom: 1px solid var(--border); cursor: pointer;
  user-select: none; display: flex; align-items: center; gap: 4px;
}
.slider-group h3 .collapse-icon {
  font-size: 9px; display: inline-block; transition: transform 0.15s;
  width: 10px; text-align: center; flex-shrink: 0;
}
.slider-group.collapsed h3 .collapse-icon { transform: rotate(0deg); }
.slider-group:not(.collapsed) h3 .collapse-icon { transform: rotate(90deg); }
.slider-group.collapsed .slider-row,
.slider-group.collapsed .checkbox-row,
.slider-group.collapsed .node-header,
.slider-group.collapsed .param-section { display: none; }

/* Collapsible param sections within a node (e.g., "Advanced") */
.param-section { padding: 0; }
.section-toggle {
  font-size: 10px; color: var(--text-dim); cursor: pointer;
  user-select: none; display: flex; align-items: center; gap: 3px;
  padding: 3px 0 1px; opacity: 0.7;
  transition: opacity 0.15s;
}
.section-toggle:hover { opacity: 1; color: var(--text); }
.section-icon {
  font-size: 8px; display: inline-block; transition: transform 0.15s;
  width: 8px; text-align: center;
}
.param-section:not(.section-collapsed) .section-icon { transform: rotate(90deg); }
.param-section.section-collapsed .slider-row,
.param-section.section-collapsed .checkbox-row { display: none; }

/* Checkbox param row */
.checkbox-row {
  padding: 2px 0;
}
.checkbox-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-dim); cursor: pointer;
}
.checkbox-label:hover { color: var(--text); }
.checkbox-label input[type="checkbox"] {
  accent-color: var(--accent); width: 14px; height: 14px; flex-shrink: 0;
}

/* Node sub-header within a group (e.g., "Clarity", "Vignette") */
.node-header {
  font-size: 12px; font-weight: 600; color: var(--text);
  padding: 6px 0 2px; margin-top: 4px;
  display: flex; align-items: center; justify-content: space-between;
}
.node-header:first-of-type { margin-top: 0; }
.node-header .node-val-reset {
  display: flex; align-items: center; gap: 4px;
}

/* Single-param node: label + value + reset on header line, slider below */
.slider-row {
  display: flex; flex-direction: column; gap: 2px; padding: 0 0 2px;
}
.slider-row .slider-label-line {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px;
}
.slider-row .slider-label-line label {
  color: var(--text-dim); cursor: pointer;
}
.slider-row .slider-label-line label:hover { color: var(--text); }
.slider-row .slider-label-line .val-reset {
  display: flex; align-items: center; gap: 4px;
}
.slider-row .slider-label-line .val {
  font-size: 11px; font-variant-numeric: tabular-nums; color: var(--text-dim);
}
.slider-row input[type="range"] { width: 100%; accent-color: var(--accent); height: 4px; }
.slider-row .slider-reset {
  font-size: 13px; color: var(--text-dim); cursor: pointer;
  background: none; border: none; padding: 0; line-height: 1;
  opacity: 0; transition: opacity 0.15s, color 0.15s;
  width: 16px; text-align: center;
}
.slider-row .slider-reset.visible { opacity: 0.5; }
.slider-row .slider-reset.visible:hover { opacity: 1; color: var(--accent); }
.slider-row:hover .slider-reset.visible { opacity: 0.7; }

#dropzone {
  grid-column: 1 / -1; grid-row: 2 / -1; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: var(--text-dim); font-size: 14px;
  overflow-y: auto;
}
#dropzone.hidden { display: none; }
#dropzone.dragover { background: var(--accent-dim); }
#editor-ui { display: contents; }
#editor-ui.hidden > * { display: none !important; }

/* --- Export Modal --- */
#export-modal-backdrop {
  display: none;
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#export-modal-backdrop.open { display: flex; }

#export-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 480px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

.export-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.export-header h2 { font-size: 15px; font-weight: 600; }
.export-header .export-dims {
  font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums;
}
.export-close-btn {
  background: none; border: none; color: var(--text-dim);
  font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1;
}
.export-close-btn:hover { color: var(--text); }

/* Format tabs */
.export-formats {
  display: flex; gap: 2px; padding: 12px 20px 0;
  flex-wrap: wrap;
}
.export-format-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 6px;
  background: transparent; border: 1px solid transparent;
  color: var(--text-dim); cursor: pointer; font-size: 12px;
  transition: all 0.15s;
}
.export-format-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.export-format-tab.active {
  background: var(--accent-dim); border-color: var(--accent);
  color: var(--text);
}
.export-format-dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.export-engine {
  font-size: 9px; padding: 1px 4px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600;
}
.export-engine.zen { background: rgba(74,158,255,0.2); color: var(--accent); }
.export-engine.browser { background: rgba(255,165,0,0.2); color: #ffa500; }

/* Format controls area */
.export-body { padding: 16px 20px; }

.export-section {
  margin-bottom: 16px;
}
.export-section-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-dim); margin-bottom: 8px;
}

/* Slider control in modal */
.export-control {
  display: grid; grid-template-columns: 90px 1fr 44px;
  align-items: center; gap: 8px; height: 28px;
}
.export-control label {
  font-size: 12px; color: var(--text-dim);
}
.export-control input[type="range"] {
  width: 100%; accent-color: var(--accent); height: 4px;
}
.export-control .export-val {
  font-size: 11px; text-align: right; font-variant-numeric: tabular-nums;
  color: var(--text-dim);
}

/* Checkbox control */
.export-check {
  display: flex; align-items: center; gap: 8px;
  height: 28px; padding-left: 0;
}
.export-check input[type="checkbox"] {
  accent-color: var(--accent); width: 14px; height: 14px;
}
.export-check label {
  font-size: 12px; color: var(--text-dim); cursor: pointer;
}

/* Resize controls */
.export-resize-row {
  display: flex; align-items: center; gap: 8px;
}
.export-resize-row label {
  font-size: 12px; color: var(--text-dim); width: 50px;
}
.export-resize-input {
  width: 80px; padding: 4px 8px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-size: 12px;
  font-variant-numeric: tabular-nums;
}
.export-resize-input:focus { border-color: var(--accent); outline: none; }
.export-aspect-lock {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-dim); cursor: pointer; padding: 4px 6px; font-size: 14px;
  line-height: 1; transition: all 0.15s;
}
.export-aspect-lock.locked { color: var(--accent); border-color: var(--accent); }
.export-resize-px { font-size: 11px; color: var(--text-dim); margin-left: 4px; }

/* Encode preview */
.export-preview-wrap {
  position: relative; margin-bottom: 16px;
  background: var(--bg); border-radius: 6px; overflow: hidden;
  min-height: 60px; display: flex; align-items: center; justify-content: center;
}
.export-preview-wrap img {
  max-width: 100%; max-height: 200px; object-fit: contain;
  display: block; border-radius: 4px;
}
.export-preview-stats {
  position: absolute; bottom: 4px; right: 6px;
  font-size: 10px; color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.5);
  padding: 2px 6px; border-radius: 3px; font-variant-numeric: tabular-nums;
  pointer-events: none;
}
.export-preview-spinner {
  display: none; width: 20px; height: 20px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.6s linear infinite;
  position: absolute;
}
.export-preview-wrap.loading .export-preview-spinner { display: block; }
.export-preview-wrap.loading img { opacity: 0.5; }

/* Estimates */
.export-estimates {
  display: flex; gap: 20px; padding: 12px 16px;
  background: var(--bg); border-radius: 6px; margin-bottom: 16px;
}
.export-estimate {
  display: flex; flex-direction: column; gap: 2px;
}
.export-estimate-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); }
.export-estimate-value { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }

/* Footer buttons */
.export-footer {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border);
}
.export-footer .btn { padding: 6px 16px; font-size: 13px; }
.export-footer .btn-primary { min-width: 120px; }

/* -- Picsum Photo Picker -- */
#sample-photos {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 8px; max-width: 720px; padding: 8px 0;
}
#sample-photos .photo-thumb {
  width: 120px; height: 90px; border-radius: 6px; cursor: pointer;
  border: 2px solid var(--border); object-fit: cover;
  transition: border-color 0.15s, transform 0.15s, opacity 0.3s;
  background: var(--surface); opacity: 0;
}
#sample-photos .photo-thumb.loaded { opacity: 1; }
#sample-photos .photo-thumb:hover {
  border-color: var(--accent); transform: scale(1.05);
}
#sample-photos .photo-thumb.loading-active {
  border-color: var(--accent); opacity: 0.6;
  animation: pulse-border 1s ease-in-out infinite;
}
@keyframes pulse-border {
  0%, 100% { border-color: var(--accent); }
  50% { border-color: var(--accent-dim); }
}
.picker-label {
  font-size: 12px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.5px; margin-top: 8px;
}
.picker-divider {
  width: 60px; height: 1px; background: var(--border); margin: 4px 0;
}

/* -- Photo Picker Popover (when editor is open) -- */
#photo-picker-popover {
  display: none;
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 16px; z-index: 50;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
}
#photo-picker-popover.open { display: block; }
#photo-picker-popover .popover-photos {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
}
#photo-picker-popover .photo-thumb {
  width: 80px; height: 60px; border-radius: 4px; cursor: pointer;
  border: 2px solid var(--border); object-fit: cover;
  transition: border-color 0.15s, transform 0.15s, opacity 0.3s;
  background: var(--surface); opacity: 0;
}
#photo-picker-popover .photo-thumb.loaded { opacity: 1; }
#photo-picker-popover .photo-thumb:hover {
  border-color: var(--accent); transform: scale(1.05);
}
#photo-picker-popover .photo-thumb.loading-active {
  border-color: var(--accent); opacity: 0.6;
  animation: pulse-border 1s ease-in-out infinite;
}

/* -- Film Preset Strip -- */
#preset-strip {
  padding: 8px 0 4px; border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
}
#preset-strip h3 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-dim); margin-bottom: 6px; padding: 0 0 2px;
  border-bottom: 1px solid var(--border); cursor: pointer;
  user-select: none; display: flex; align-items: center; gap: 4px;
}
#preset-strip h3 .collapse-icon {
  font-size: 9px; display: inline-block; transition: transform 0.15s;
  width: 10px; text-align: center; flex-shrink: 0;
}
#preset-strip.collapsed h3 .collapse-icon { transform: rotate(0deg); }
#preset-strip:not(.collapsed) h3 .collapse-icon { transform: rotate(90deg); }
#preset-strip.collapsed .preset-content { display: none; }
.preset-intensity-row {
  display: grid; grid-template-columns: 60px 1fr 36px;
  align-items: center; gap: 6px; height: 24px; margin-top: 6px;
}
.preset-intensity-row label { font-size: 11px; color: var(--text-dim); }
.preset-intensity-row input[type="range"] { width: 100%; accent-color: var(--accent); height: 4px; }
.preset-intensity-row .val {
  font-size: 11px; text-align: right; font-variant-numeric: tabular-nums;
  color: var(--text-dim);
}
#preset-chips {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.preset-chip {
  font-size: 10px; padding: 3px 7px; border-radius: 3px;
  cursor: pointer; border: 1.5px solid var(--border);
  background: var(--bg); color: var(--text-dim);
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  white-space: nowrap; line-height: 1.3;
}
.preset-chip:hover {
  border-color: var(--text-dim); color: var(--text);
}
.preset-chip.active {
  border-color: var(--accent); color: #fff;
  background: var(--accent-dim);
}
/* Category color accents via left border */
.preset-chip[data-cat="creative"]     { border-left: 3px solid #e06c9f; }
.preset-chip[data-cat="classic_neg"]  { border-left: 3px solid #d4a054; }
.preset-chip[data-cat="slide"]        { border-left: 3px solid #5cc462; }
.preset-chip[data-cat="motion"]       { border-left: 3px solid #7b8fe0; }
.preset-chip[data-cat="digital"]      { border-left: 3px solid #5cccd4; }
.preset-chip[data-cat="cinematic"]    { border-left: 3px solid #b06ce0; }
.preset-chip[data-cat="none"]         { border-left: 3px solid var(--text-dim); }

/* --- Error / Info Toast --- */
.error-toast {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(20, 0, 0, 0.92); color: #ff6b6b;
  padding: 20px 32px; border-radius: 12px;
  font-size: 15px; max-width: 80%; text-align: center;
  z-index: 10; cursor: pointer;
  border: 1px solid rgba(255, 107, 107, 0.3);
  opacity: 1; transition: opacity 0.4s;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
}
.error-toast .error-toast-msg {
  margin-bottom: 8px; font-weight: 500;
}
.error-toast .error-toast-actions {
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
.error-toast .error-toast-hint {
  font-size: 12px; color: rgba(255, 107, 107, 0.6);
}
.error-toast .error-toast-copy {
  font-size: 14px; cursor: pointer; opacity: 0.5;
  transition: opacity 0.15s;
}
.error-toast .error-toast-copy:hover { opacity: 1; }
.error-toast:hover { background: rgba(40, 0, 0, 0.95); }
.error-toast.fade-out { opacity: 0; }
.info-toast {
  position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.7); color: var(--text-dim); padding: 8px 16px;
  border-radius: 8px; font-size: 13px; max-width: 80%; text-align: center;
  z-index: 9; pointer-events: none;
  opacity: 1; transition: opacity 0.4s;
}
.info-toast.fade-out { opacity: 0; }

/* --- Export History --- */
.export-history-section { margin-top: 8px; }
.export-history-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid var(--border);
}
.export-history-thumb {
  width: 48px; height: 36px; object-fit: cover; border-radius: 3px;
  background: var(--bg); flex-shrink: 0;
}
.export-history-info {
  display: flex; flex-wrap: wrap; gap: 4px 8px; font-size: 11px;
  color: var(--text-dim); flex: 1; font-variant-numeric: tabular-nums;
}
.export-history-format {
  font-weight: 600; color: var(--text); font-size: 10px;
  background: var(--accent-dim); padding: 1px 4px; border-radius: 2px;
}
.export-history-actions { display: flex; gap: 4px; flex-shrink: 0; }
.export-history-actions a {
  font-size: 16px; color: var(--text-dim); text-decoration: none;
  padding: 2px; line-height: 1;
}
.export-history-actions a:hover { color: var(--accent); }

/* --- User Presets --- */
#user-presets-section {
  padding: 4px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 2px;
}
.user-presets-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px;
}
.user-presets-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim);
}
.user-presets-actions { display: flex; gap: 4px; }
.user-preset-btn { font-size: 10px; padding: 2px 6px; }
.user-preset-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 3px 0; font-size: 12px;
}
.user-preset-name {
  color: var(--text-dim); cursor: pointer; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; flex: 1;
}
.user-preset-name:hover { color: var(--accent); }
.user-preset-del {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 14px; padding: 0 4px; line-height: 1; opacity: 0.5;
}
.user-preset-del:hover { opacity: 1; color: #ef4444; }

/* --- Compare badge --- */
#compare-badge {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.7); color: #fff; font-size: 18px; font-weight: 700;
  letter-spacing: 2px; padding: 10px 24px; border-radius: 8px;
  pointer-events: none; z-index: 8; display: none;
  align-items: center; justify-content: center;
}

/* --- Slider disabled state --- */
.slider-disabled {
  opacity: 0.4; pointer-events: none;
}

/* --- Loading message repositioned below error toast area --- */
.loading-message {
  align-items: flex-end !important;
  padding-bottom: 20%;
}

/* --- Dock positions --- */
/* Default: right (already set on body) */
body.dock-left {
  grid-template-columns: 280px 1fr;
}
body.dock-left aside {
  border-left: none; border-right: 1px solid var(--border);
  order: -1;
}
body.dock-left main { order: 0; }

body.dock-bottom {
  grid-template-columns: 1fr;
  grid-template-rows: auto 1fr auto;
}
body.dock-bottom aside {
  border-left: none; border-top: 1px solid var(--border);
  max-height: 40vh; overflow-y: auto;
}

#dock-toggle {
  font-size: 11px; padding: 2px 6px; cursor: pointer;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text-dim); border-radius: 3px;
}
#dock-toggle:hover { color: var(--text); border-color: var(--accent); }

/* --- Responsive layout --- */
@media (max-width: 840px) {
  body, body.dock-left, body.dock-right {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto;
  }
  aside {
    border-left: none !important; border-right: none !important;
    border-top: 1px solid var(--border);
    max-height: 40vh;
    overflow-y: auto;
  }
  .slider-row {
    padding: 4px 0;
  }
}
</style>
</head>
<body>

<header>
  <h1>zenpipe</h1>
  <button class="btn" id="open-btn">Open</button>
  <button class="btn" id="pick-btn">Pick</button>
  <button class="btn btn-primary" id="export-btn">Export</button>
  <button id="dock-toggle" title="Dock sidebar: right / left / bottom">R</button>
  <span id="status">Drop an image to start</span>
  <div id="photo-picker-popover">
    <div class="popover-photos" id="popover-photos"></div>
  </div>
</header>

<div id="dropzone">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M12 16V4M12 4l-4 4m4-4l4 4"/>
    <path d="M20 16v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/>
  </svg>
  <span>Drop an image here, or click Open</span>
  <input type="file" id="file-input" accept="image/*" hidden>
  <div class="picker-divider"></div>
  <span class="picker-label">or choose a sample photo</span>
  <div id="sample-photos"></div>
</div>

<div id="editor-ui" class="hidden">
  <main>
    <div id="detail-wrap">
      <canvas id="detail-canvas"></canvas>
      <div id="pixel-info"></div>
      <div class="loading-message" id="loading-message">Loading...</div>
      <div class="spinner-overlay" id="detail-spinner"><div class="spinner"></div></div>
      <button id="minimap-toggle" title="Toggle minimap">minimap</button>
      <div id="overview-wrap">
        <canvas id="overview-canvas"></canvas>
        <div id="region-selector"></div>
        <button id="crop-toggle" title="Toggle crop region">crop</button>
        <div class="spinner-overlay" id="overview-spinner"><div class="spinner"></div></div>
      </div>
    </div>
  </main>
  <aside id="sidebar">
    <button id="reset-btn">Reset All</button>
    <div id="preset-strip">
      <h3><span class="collapse-icon">&#x25B8;</span>Film Looks</h3>
      <div class="preset-content">
        <div id="preset-chips"><!-- Generated by JS --></div>
        <div class="preset-intensity-row">
          <label>Intensity</label>
          <input type="range" id="preset-intensity" min="0" max="1" step="0.05" value="1"
                 data-identity="1" data-key="preset-intensity">
          <span class="val" id="preset-intensity-val">1.00</span>
        </div>
      </div>
    </div>
    <!-- Slider groups generated from schema -->
  </aside>
</div>

<!-- Export Modal -->
<div id="export-modal-backdrop">
  <div id="export-modal">
    <div class="export-header">
      <div>
        <h2>Export Image</h2>
        <div class="export-dims" id="export-dims"></div>
      </div>
      <button class="export-close-btn" id="export-close" aria-label="Close">&times;</button>
    </div>

    <div class="export-formats" id="export-format-tabs"></div>

    <div class="export-body">
      <div class="export-section" id="export-format-controls"></div>

      <div class="export-section">
        <div class="export-section-label">Output Size</div>
        <div class="export-resize-row" style="margin-bottom: 6px;">
          <label for="export-width">Width</label>
          <input type="number" class="export-resize-input" id="export-width" min="1" max="32000">
          <button class="export-aspect-lock locked" id="export-aspect-lock" title="Lock aspect ratio">&#x1f512;</button>
          <label for="export-height">Height</label>
          <input type="number" class="export-resize-input" id="export-height" min="1" max="32000">
          <span class="export-resize-px" id="export-megapixels"></span>
        </div>
      </div>

      <div class="export-preview-wrap" id="export-preview-wrap">
        <img id="export-preview-img" alt="">
        <div class="export-preview-stats" id="export-preview-stats"></div>
        <div class="export-preview-spinner" id="export-preview-spinner"></div>
      </div>

      <div class="export-estimates">
        <div class="export-estimate">
          <span class="export-estimate-label">Preview Size</span>
          <span class="export-estimate-value" id="export-est-size">--</span>
        </div>
        <div class="export-estimate">
          <span class="export-estimate-label">Est. Full Size</span>
          <span class="export-estimate-value" id="export-est-full">--</span>
        </div>
        <div class="export-estimate">
          <span class="export-estimate-label">Bits/Pixel</span>
          <span class="export-estimate-value" id="export-est-bpp">--</span>
        </div>
      </div>
    </div>

    <div class="export-footer">
      <button class="btn" id="export-cancel">Cancel</button>
      <button class="btn btn-primary" id="export-confirm">Export JPEG</button>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
