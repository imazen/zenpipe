name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'src/**'
      - '.github/workflows/demo-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "demo-pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: demo/crate

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Clone unpublished sibling repos
        run: |
          cd ..
          # Unpublished crates (path deps kept as paths)
          for repo in zennode zenfilters zencodecs; do
            git clone --depth 1 "https://github.com/imazen/$repo.git" "$repo"
          done

      - name: Patch zenpipe Cargo.toml for CI
        run: |
          # Convert path deps to git URLs (same as main CI)
          sed -i \
            -e 's|path = "\.\./zenresize"|git = "https://github.com/imazen/zenresize"|g' \
            -e 's|path = "\.\./zenblend"|git = "https://github.com/imazen/zenblend"|g' \
            -e 's|path = "\.\./zenlayout"|git = "https://github.com/imazen/zenlayout"|g' \
            -e 's|path = "\.\./linear-srgb"|git = "https://github.com/imazen/linear-srgb"|g' \
            -e 's|path = "\.\./zencodec"|git = "https://github.com/imazen/zencodec"|g' \
            -e 's|path = "\.\./whereat"|git = "https://github.com/imazen/whereat"|g' \
            -e 's|path = "\.\./zenjpeg/zenjpeg"|git = "https://github.com/imazen/zenjpeg"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels-convert"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zenpng"|git = "https://github.com/imazen/zenpng"|g' \
            -e 's|path = "\.\./zenwebp"|git = "https://github.com/imazen/zenwebp"|g' \
            -e 's|path = "\.\./zengif"|git = "https://github.com/imazen/zengif"|g' \
            -e 's|path = "\.\./zenavif"|git = "https://github.com/imazen/zenavif"|g' \
            -e 's|path = "\.\./zenjxl"|git = "https://github.com/imazen/zenjxl"|g' \
            -e 's|path = "\.\./zentiff"|git = "https://github.com/imazen/zentiff"|g' \
            -e 's|path = "\.\./zenbitmaps"|git = "https://github.com/imazen/zenbitmaps"|g' \
            -e 's|path = "\.\./zenquant"|git = "https://github.com/imazen/zenquant"|g' \
            -e '/zensally/d' \
            -e '/imageflow_types/d' \
            -e '/imageflow_riapi/d' \
            -e 's|, "dep:imageflow_types"||g' \
            -e 's|, "dep:imageflow_riapi"||g' \
            Cargo.toml
          # Add patches for unpublished crates
          printf '\n[patch.crates-io]\nultrahdr-core = { git = "https://github.com/imazen/ultrahdr" }\nzennode = { git = "https://github.com/imazen/zennode" }\n' >> Cargo.toml
          rm -f Cargo.lock

      - name: Build WASM
        run: |
          cd demo/crate
          RUSTFLAGS="-C target-feature=+simd128" wasm-pack build \
            --target web --out-dir ../pkg --release

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp demo/index.html _site/
          cp demo/schema.json _site/
          cp demo/worker.js _site/
          cp demo/serve.py _site/
          cp -r demo/js _site/js
          cp -r demo/pkg _site/pkg
          # Add coi-serviceworker for SharedArrayBuffer support on Pages
          curl -sL https://raw.githubusercontent.com/nicknisi/nicknisi.github.io/main/coi-serviceworker.js \
            -o _site/coi-serviceworker.js || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Also deploy to Vercel (with COOP/COEP headers for SharedArrayBuffer)
      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        run: |
          npm i -g vercel
          cd _site
          cp ../demo/vercel.json .
          vercel deploy --prod --token=$VERCEL_TOKEN --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
