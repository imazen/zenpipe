name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'src/**'
      - '.github/workflows/demo-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "demo-pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: demo/crate

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.117

      - uses: actions/checkout@v4
        with:
          repository: imazen/zen-workspace
          path: zen-workspace

      - name: Install cargo-superwork
        run: cargo install cargo-superwork --git https://github.com/imazen/cargo-superwork

      - name: Transform deps for CI
        run: |
          cargo superwork ci-prep --config zen-workspace/Superwork.toml
          # Transitive path dep: zenjxl -> zenjxl-decoder (separate repo)
          python3 -c "
          with open('Cargo.toml') as f: t = f.read()
          patch = 'zenjxl-decoder = { git = \"https://github.com/imazen/zenjxl-decoder\" }\nzenjxl-decoder-macros = { git = \"https://github.com/imazen/zenjxl-decoder\" }\nzenjxl-decoder-simd = { git = \"https://github.com/imazen/zenjxl-decoder\" }\n'
          t = t.replace('[patch.crates-io]\n', '[patch.crates-io]\n' + patch, 1)
          with open('Cargo.toml', 'w') as f: f.write(t)
          "
          rm -f Cargo.lock

      - name: Build WASM (threaded, nightly)
        run: |
          cd demo/crate
          RUSTFLAGS="-C target-feature=+atomics,+bulk-memory,+mutable-globals,+simd128 -C link-args=--shared-memory --import-memory --max-memory=1073741824 --export=__wasm_init_tls --export=__tls_size --export=__tls_align --export=__tls_base" \
            cargo +nightly build --target wasm32-unknown-unknown --release \
            --features "wasm,parallel" -Z build-std=panic_abort,std
          wasm-bindgen --target web --out-dir ../pkg \
            target/wasm32-unknown-unknown/release/zenpipe_demo.wasm

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp demo/index.html _site/
          cp demo/schema.json _site/
          cp demo/worker.js _site/
          cp demo/serve.py _site/
          cp demo/coi-serviceworker.js _site/
          cp -r demo/js _site/js
          cp -r demo/pkg _site/pkg

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Also deploy to Vercel (with COOP/COEP headers for SharedArrayBuffer)
      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        run: |
          npm i -g vercel
          cd _site
          cp ../demo/vercel.json .
          vercel deploy --prod --token=$VERCEL_TOKEN --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
