name: Deploy Demo

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'src/**'
      - '.github/workflows/demo-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build WASM & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: demo/crate

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Clone sibling repos
        run: |
          cd ..
          for repo in zennode zenfilters zencodec zenpixels zenresize zenlayout \
                      zenblend linear-srgb zencodecs zenjpeg zenpng zenwebp \
                      zengif zenjxl zenavif ravif zenrav1e zenflate zenquant \
                      zenbitmaps enough whereat; do
            if [ ! -d "$repo" ]; then
              git clone --depth 1 "https://github.com/imazen/$repo.git" "$repo" 2>/dev/null || true
            fi
          done
          # ravif contains zenravif
          # zennode contains zennode-derive

      - name: Patch zenpipe Cargo.toml for CI
        run: |
          cd zenpipe
          sed -i \
            -e '/imageflow_types/d' \
            -e '/imageflow_riapi/d' \
            -e 's|, "dep:imageflow_types"||g' \
            -e 's|, "dep:imageflow_riapi"||g' \
            -e '/zensally/d' \
            Cargo.toml

      - name: Build WASM
        run: |
          cd demo/crate
          RUSTFLAGS="-C target-feature=+simd128" wasm-pack build \
            --target web --out-dir ../pkg --release

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Deploy to Vercel
        run: |
          cd demo
          # Remove vercel.json buildCommand (we already built)
          echo '{"outputDirectory":".","framework":null}' > vercel.json
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_SCOPE }} \
            --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
