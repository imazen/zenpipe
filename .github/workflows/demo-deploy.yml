name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'src/**'
      - '.github/workflows/demo-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "demo-pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: demo/crate

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Clone sibling repos
        run: |
          cd ..
          for repo in zennode zenfilters zencodec zenpixels zenresize zenlayout \
                      zenblend linear-srgb zencodecs zenjpeg zenpng zenwebp \
                      zengif zenjxl zenavif ravif zenrav1e zenflate zenquant \
                      zenbitmaps enough whereat archmage magetypes garb \
                      ultrahdr safe_unaligned_simd heic zenavif-parse \
                      zenavif-serialize zenjxl-decoder; do
            if [ ! -d "$repo" ]; then
              git clone --depth 1 "https://github.com/imazen/$repo.git" "$repo" 2>/dev/null || true
            fi
          done

      - name: Patch zenpipe Cargo.toml for CI
        run: |
          sed -i \
            -e '/imageflow_types/d' \
            -e '/imageflow_riapi/d' \
            -e 's|, "dep:imageflow_types"||g' \
            -e 's|, "dep:imageflow_riapi"||g' \
            -e '/zensally/d' \
            Cargo.toml

      - name: Build WASM
        run: |
          cd demo/crate
          RUSTFLAGS="-C target-feature=+simd128" wasm-pack build \
            --target web --out-dir ../pkg --release

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp demo/index.html _site/
          cp demo/schema.json _site/
          cp demo/worker.js _site/
          cp demo/serve.py _site/
          cp -r demo/js _site/js
          cp -r demo/pkg _site/pkg
          # Add coi-serviceworker for SharedArrayBuffer support on Pages
          curl -sL https://raw.githubusercontent.com/nicknisi/nicknisi.github.io/main/coi-serviceworker.js \
            -o _site/coi-serviceworker.js || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Also deploy to Vercel (with COOP/COEP headers for SharedArrayBuffer)
      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        run: |
          npm i -g vercel
          cd _site
          cp ../demo/vercel.json .
          vercel deploy --prod --token=$VERCEL_TOKEN --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
