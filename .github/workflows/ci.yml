name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-26-intel, windows-latest, windows-11-arm]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Patch path deps for CI
        shell: bash
        run: |
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' 's/, path = "[^"]*"//g' Cargo.toml
          else
            sed -i 's/, path = "[^"]*"//g' Cargo.toml
          fi
          rm -f Cargo.lock
      - name: Test (default features)
        run: cargo test --lib

  features:
    name: Feature permutations (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: features
      - name: Patch path deps for CI
        shell: bash
        run: |
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' 's/, path = "[^"]*"//g' Cargo.toml
          else
            sed -i 's/, path = "[^"]*"//g' Cargo.toml
          fi
          rm -f Cargo.lock
      - name: Check (no default features)
        run: cargo check --no-default-features
      - name: Test (jpeg + webp + png)
        run: cargo test --no-default-features --features "jpeg,webp,png" --lib
      - name: Test (web codecs)
        run: cargo test --no-default-features --features "jpeg,webp,gif,gif-zenquant,png,png-zenquant" --lib
      - name: Test (avif + jxl decode + core encoders)
        run: cargo test --no-default-features --features "avif-decode,jxl-decode,jpeg,webp,png" --lib
      - name: Test (default features)
        run: cargo test --lib
      - name: Test (default + tiff + bitmaps)
        run: cargo test --features "tiff,bitmaps" --lib

  i686:
    name: Check (i686 cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu
      - uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-i686
      - name: Patch path deps for CI
        shell: bash
        run: |
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' 's/, path = "[^"]*"//g' Cargo.toml
          else
            sed -i 's/, path = "[^"]*"//g' Cargo.toml
          fi
          rm -f Cargo.lock
      - name: Check (i686)
        run: cross check --target i686-unknown-linux-gnu

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Patch path deps for CI
        shell: bash
        run: |
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' 's/, path = "[^"]*"//g' Cargo.toml
          else
            sed -i 's/, path = "[^"]*"//g' Cargo.toml
          fi
          rm -f Cargo.lock
      - name: Clippy (default features)
        run: cargo clippy --lib -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format check
        run: cargo fmt --all -- --check

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
      - name: Patch path deps for CI
        shell: bash
        run: |
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' 's/, path = "[^"]*"//g' Cargo.toml
          else
            sed -i 's/, path = "[^"]*"//g' Cargo.toml
          fi
          rm -f Cargo.lock
      - name: Check MSRV (default features)
        run: cargo hack check --rust-version
      - name: Check MSRV (no default features)
        run: cargo hack check --rust-version --no-default-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Patch path deps for CI
        shell: bash
        run: |
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' 's/, path = "[^"]*"//g' Cargo.toml
          else
            sed -i 's/, path = "[^"]*"//g' Cargo.toml
          fi
          rm -f Cargo.lock
      - name: Generate coverage (default features)
        run: cargo llvm-cov --lib --lcov --output-path lcov.info
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
