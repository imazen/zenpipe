name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-26-intel
          - windows-latest
          - windows-11-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zenresize"|git = "https://github.com/imazen/zenresize"|g' \
            -e 's|path = "\.\./zenblend"|git = "https://github.com/imazen/zenblend"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels-convert"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zencodec"|git = "https://github.com/imazen/zencodec"|g' \
            -e 's|path = "\.\./whereat"|git = "https://github.com/imazen/whereat"|g' \
            -e 's|path = "\.\./zenfilters"|git = "https://github.com/imazen/zenfilters"|g' \
            -e 's|path = "\.\./zenjpeg/zenjpeg"|git = "https://github.com/imazen/zenjpeg"|g' \
            -e 's|path = "\.\./zengif"|git = "https://github.com/imazen/zengif"|g' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy --all-targets --no-default-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-26-intel
          - windows-latest
          - windows-11-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zenresize"|git = "https://github.com/imazen/zenresize"|g' \
            -e 's|path = "\.\./zenblend"|git = "https://github.com/imazen/zenblend"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels-convert"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zencodec"|git = "https://github.com/imazen/zencodec"|g' \
            -e 's|path = "\.\./whereat"|git = "https://github.com/imazen/whereat"|g' \
            -e 's|path = "\.\./zenfilters"|git = "https://github.com/imazen/zenfilters"|g' \
            -e 's|path = "\.\./zenjpeg/zenjpeg"|git = "https://github.com/imazen/zenjpeg"|g' \
            -e 's|path = "\.\./zengif"|git = "https://github.com/imazen/zengif"|g' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml
      - run: cargo test --all-targets
      - run: cargo test --all-targets --no-default-features
      - run: cargo test --features zennode
      - run: cargo test --features zennode,json-schema

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zenresize"|git = "https://github.com/imazen/zenresize"|g' \
            -e 's|path = "\.\./zenblend"|git = "https://github.com/imazen/zenblend"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels-convert"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zencodec"|git = "https://github.com/imazen/zencodec"|g' \
            -e 's|path = "\.\./whereat"|git = "https://github.com/imazen/whereat"|g' \
            -e 's|path = "\.\./zenfilters"|git = "https://github.com/imazen/zenfilters"|g' \
            -e 's|path = "\.\./zenjpeg/zenjpeg"|git = "https://github.com/imazen/zenjpeg"|g' \
            -e 's|path = "\.\./zengif"|git = "https://github.com/imazen/zengif"|g' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml
      - name: Check MSRV
        run: cargo hack check --rust-version
