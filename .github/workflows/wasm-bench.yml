name: WASM Benchmark

on:
  push:
    branches: [main]
    paths:
      - 'wasm-size-shim/**'
      - '.github/workflows/wasm-bench.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC

env:
  CARGO_TERM_COLOR: always

jobs:
  wasm-bench:
    name: Build + Measure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: zenpipe

      # Clone all sibling repos into the expected directory layout.
      # Path deps in Cargo.toml expect ../zenresize, ../zenblend, etc.
      - name: Clone sibling repos
        env:
          GH_TOKEN: ${{ secrets.ZEN_REPOS_PAT || github.token }}
        run: |
          repos=(
            zenresize zenblend zenfilters zencodec zenpng zenwebp
            zengif zenjxl zenpixels archmage jxl-encoder-rs
            zenjxl-decoder
          )
          for repo in "${repos[@]}"; do
            echo "Cloning $repo..."
            gh repo clone "imazen/$repo" "$repo" -- --depth=1 --single-branch 2>/dev/null \
              || echo "::warning::Failed to clone $repo (may be private)"
          done
          # zenjpeg needs special handling (Cargo.toml references ../../zenjpeg/zenjpeg)
          gh repo clone "imazen/zenjpeg" "zenjpeg" -- --depth=1 --single-branch 2>/dev/null \
            || echo "::warning::Failed to clone zenjpeg"
          ls -d */ | head -20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: zenpipe/wasm-size-shim

      - name: Install wasmtime
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      - name: Build cdylib
        working-directory: zenpipe/wasm-size-shim
        run: |
          RUSTFLAGS="-C target-feature=+simd128" \
            cargo build --target wasm32-unknown-unknown --release --lib

      - name: Build wasip1 binary
        working-directory: zenpipe/wasm-size-shim
        run: |
          RUSTFLAGS="-C target-feature=+simd128" \
            cargo build --target wasm32-wasip1 --release --bin wasm-demo

      - name: Measure binary size
        working-directory: zenpipe/wasm-size-shim
        run: |
          WASM=target/wasm32-unknown-unknown/release/wasm_size_shim.wasm
          RAW=$(wc -c < "$WASM")
          gzip -9 -k -f "$WASM"
          GZ=$(wc -c < "$WASM.gz")

          # Count exports (needs wasm-tools or fallback)
          if command -v wasm-tools &>/dev/null; then
            EXPORTS=$(wasm-tools print "$WASM" 2>/dev/null | grep -c '(export' || echo 0)
          else
            EXPORTS="?"
          fi

          {
            echo "### WASM Binary Size"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Raw | ${RAW} bytes ($((RAW / 1048576)).$((RAW % 1048576 * 10 / 1048576)) MB) |"
            echo "| Gzip | ${GZ} bytes ($((GZ / 1048576)).$((GZ % 1048576 * 10 / 1048576)) MB) |"
            echo "| Exports | ${EXPORTS} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run 4K benchmark
        working-directory: zenpipe/wasm-size-shim
        run: |
          {
            echo "### 4K Benchmark (3840x2160, wasmtime simd128)"
            echo ""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          for i in 1 2 3; do
            echo "--- Run $i ---" >> "$GITHUB_STEP_SUMMARY"
            wasmtime --wasm simd \
              target/wasm32-wasip1/release/wasm-demo.wasm 2>&1 \
              | grep -E 'Resize|Convert|Filters|JPEG|PNG|WebP|JXL|GIF' \
              >> "$GITHUB_STEP_SUMMARY"
          done

          {
            echo '```'
            echo ""
            echo "Codecs: JPEG, PNG, WebP, JXL, GIF (encode+decode)"
            echo "Pipeline: resize, composite, convert, filter, layout, overlay, crop, alpha"
          } >> "$GITHUB_STEP_SUMMARY"
