<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111111">
<title>zenfilters Film Look Gallery</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #111; color: #eee;
  font-family: system-ui, -apple-system, sans-serif;
  -webkit-user-select: none; user-select: none;
  display: flex; flex-direction: column;
}

/* ── Filter header ── */
#filter-header {
  background: #0a0a0a; text-align: center;
  padding: 10px 12px 4px;
  padding-top: calc(10px + env(safe-area-inset-top, 0));
}
#filter-name { font-size: 22px; font-weight: 700; }

/* ── Top bar ── */
#top-bar {
  display: flex; align-items: center; justify-content: center;
  padding: 4px 12px 6px; gap: 8px; background: #0a0a0a;
}
#top-bar button {
  background: #222; border: none; color: #aaa; padding: 8px 16px;
  border-radius: 6px; font-size: 14px; cursor: pointer;
  min-height: 36px; -webkit-tap-highlight-color: transparent;
}
#top-bar button:active { background: #444; }
#top-bar .photo-label { color: #888; font-size: 13px; min-width: 60px; text-align: center; }
#ab-toggle {
  background: #222; border: 1px solid #333; color: #aaa;
  padding: 6px 14px; border-radius: 6px; font-size: 12px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  margin-left: auto;
}
#ab-toggle:active { background: #444; }
#ab-toggle.showing-original { background: #1a3a5a; color: #4af; border-color: #4af; }

/* ── Main area ── */
#main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative; min-height: 0;
}
.side-btn {
  background: none; border: none; color: #555; font-size: 28px;
  padding: 16px 10px; cursor: pointer; z-index: 2;
  min-width: 44px; min-height: 80px;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
.side-btn:hover { color: #aaa; }
.side-btn:active { color: #fff; }

#img-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  min-width: 0; min-height: 0; overflow: hidden;
}
#img-box {
  position: relative; display: inline-block; line-height: 0;
}
#the-image {
  display: block; width: auto; height: auto;
  max-width: calc(100vw - 88px);
  max-height: calc(100dvh - 200px);
}

/* ── Corner triangle: 1/3 of top edge ── */
#corner-orig {
  position: absolute; top: 0; right: 0; z-index: 2;
  width: 33.33%; aspect-ratio: 1;
  overflow: hidden;
  clip-path: polygon(0 0, 100% 0, 100% 100%);
  cursor: pointer;
}
#corner-orig img {
  position: absolute; top: 0; right: 0;
  width: var(--img-w, 100%); height: var(--img-h, 100%);
  object-fit: cover; object-position: top right;
}
/* Two visible edges: top and hypotenuse */
#corner-border {
  position: absolute; top: 0; right: 0; z-index: 3;
  width: 33.33%; aspect-ratio: 1;
  pointer-events: none;
}
#corner-border::before {
  content: ''; position: absolute; top: 0; right: 0;
  width: 100%; height: 0;
  border-top: 2px solid rgba(255,255,255,0.5);
}
#corner-border::after {
  content: ''; position: absolute; top: 0; right: 0;
  width: 141.4%; height: 0;
  border-top: 2px solid rgba(255,255,255,0.5);
  transform-origin: top right;
  transform: rotate(45deg);
}

/* ── Filter name pill overlay ── */
#img-overlay {
  position: absolute; bottom: 10px; right: 10px; z-index: 3;
  background: rgba(0,0,0,0.75); color: #fff;
  padding: 12px 16px; border-radius: 8px;
  font-size: 15px; font-weight: 600;
  pointer-events: none;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
@media (min-width: 768px) {
  #img-overlay { font-size: 18px; padding: 16px 22px; border-radius: 10px; }
}

/* ── Filter button grid ── */
#filter-grid {
  display: flex; flex-wrap: wrap; justify-content: center;
  padding: 6px 6px; gap: 4px; background: #080808;
  overflow-y: auto; max-height: 28dvh;
  padding-bottom: calc(6px + env(safe-area-inset-bottom, 0));
}
#filter-grid button {
  background: #1a1a1a; border: 1px solid #252525; color: #888;
  padding: 5px 9px; border-radius: 5px; font-size: 11px;
  cursor: pointer; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
@media (min-width: 768px) {
  #filter-grid button { padding: 8px 14px; font-size: 14px; border-radius: 6px; }
  #filter-grid { gap: 6px; }
}
#filter-grid button:hover { background: #2a2a2a; color: #ccc; }
#filter-grid button:active { background: #444; }
#filter-grid button.active { background: #1a3a5a; color: #4af; border-color: #4af; }
#filter-grid .group-label {
  width: 100%; text-align: center; font-size: 10px; color: #555;
  text-transform: uppercase; letter-spacing: 1px; padding: 6px 0 2px;
}

.loading {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%); color: #666;
}
</style>
</head>
<body>

<div id="filter-header">
  <span id="filter-name">Original</span>
</div>

<div id="top-bar">
  <button id="btn-prev-photo">&#9650; Prev</button>
  <span class="photo-label" id="photo-label">1 / 1</span>
  <button id="btn-next-photo">Next &#9660;</button>
  <button id="ab-toggle">Show Original</button>
</div>

<div id="main">
  <button class="side-btn" id="btn-prev-filter">&#9664;</button>
  <div id="img-wrap">
    <div id="img-box">
      <img id="the-image" alt="">
      <div id="corner-orig"><img id="corner-img" alt=""></div>
      <div id="corner-border"></div>
      <div id="img-overlay"></div>
    </div>
  </div>
  <button class="side-btn" id="btn-next-filter">&#9654;</button>
</div>

<div id="filter-grid"></div>

<div class="loading" id="loading">Loading...</div>

<script>
let manifest = null;
let imageIdx = 0;
let presetIdx = -1;
let showOriginal = false;

const mainImg = document.getElementById('the-image');
const cornerImg = document.getElementById('corner-img');
const cornerDiv = document.getElementById('corner-orig');
const cornerBorder = document.getElementById('corner-border');
const imgOverlay = document.getElementById('img-overlay');
const filterName = document.getElementById('filter-name');
const photoLabel = document.getElementById('photo-label');
const abToggle = document.getElementById('ab-toggle');
const filterGrid = document.getElementById('filter-grid');
const loading = document.getElementById('loading');

async function init() {
  try {
    const resp = await fetch('gallery/manifest.json');
    manifest = await resp.json();
  } catch {
    loading.textContent = 'Failed to load manifest.json';
    return;
  }
  loading.style.display = 'none';
  imageIdx = manifest.default_image || 0;
  sortPresetsByAwesomeness();
  buildFilterGrid();
  setupControls();
  updateView();
}

function sortPresetsByAwesomeness() {
  const order = [
    'kodachrome', 'velvia', 'cyberpunk_neon', 'teal_orange', 'desert_crush',
    'neon_noir', 'green_code', 'noir', 'bleach_bypass', 'technicolor',
    'moonlit_blue', 'print_2383', 'portra', 'kodak_gold', 'cross_process',
    'candy_pop', 'french_whimsy', 'classic_neg', 'golden_hour', 'ektar',
    'tungsten_500t', 'cold_case', 'arctic_light', 'dusty_americana',
    'faded_film', 'classic_chrome', 'ektachrome', 'superia', 'cool_chrome',
    'pro_400h', 'provia', 'matte', 'desert_spice', 'blockbuster',
  ];
  const rank = {};
  order.forEach((id, i) => rank[id] = i);
  const groupOrder = { 'Film Looks': 0, 'Presets': 1 };
  manifest.presets.sort((a, b) => {
    const ga = groupOrder[a.group] ?? 0, gb = groupOrder[b.group] ?? 0;
    if (ga !== gb) return ga - gb;
    return (rank[a.id] ?? 99) - (rank[b.id] ?? 99);
  });
}

function buildFilterGrid() {
  let html = '<button class="active" data-idx="-1">Original</button>';
  let lastGroup = '';
  manifest.presets.forEach((p, i) => {
    const g = p.group || '';
    if (g && g !== lastGroup) {
      html += `<span class="group-label">${g}</span>`;
      lastGroup = g;
    }
    html += `<button data-idx="${i}">${p.name}</button>`;
  });
  filterGrid.innerHTML = html;
  filterGrid.querySelectorAll('button').forEach(el => {
    el.addEventListener('click', () => {
      presetIdx = parseInt(el.dataset.idx);
      showOriginal = false;
      updateView();
    });
  });
}

function imagePath(name, pid) {
  return pid === null ? `gallery/originals/${name}.jpg` : `gallery/presets/${pid}/${name}.jpg`;
}

function sizeCorner() {
  const box = document.getElementById('img-box');
  box.style.setProperty('--img-w', mainImg.offsetWidth + 'px');
  box.style.setProperty('--img-h', mainImg.offsetHeight + 'px');
}

function updateView() {
  if (!manifest) return;
  const name = manifest.images[imageIdx];
  const preset = presetIdx >= 0 ? manifest.presets[presetIdx] : null;
  const origSrc = imagePath(name, null);
  const hasFilter = preset && !showOriginal;

  // Triangle always shows original. Main shows filtered (or original if no filter/A/B).
  cornerImg.src = origSrc;
  cornerDiv.style.display = '';
  cornerBorder.style.display = '';

  if (preset && !showOriginal) {
    mainImg.src = imagePath(name, preset.id);
    imgOverlay.textContent = preset.name;
    imgOverlay.style.display = '';
  } else {
    mainImg.src = origSrc;
    imgOverlay.textContent = preset ? 'Original' : '';
    imgOverlay.style.display = preset ? '' : 'none';
  }

  mainImg.onload = sizeCorner;

  filterName.textContent = preset
    ? (showOriginal ? `${preset.name} (original)` : preset.name)
    : 'Original';
  photoLabel.textContent = `${imageIdx + 1} / ${manifest.images.length}`;

  abToggle.textContent = showOriginal ? 'Show Filtered' : 'Show Original';
  abToggle.classList.toggle('showing-original', showOriginal);
  if (!preset) {
    abToggle.textContent = 'Select a filter';
    abToggle.classList.remove('showing-original');
  }

  filterGrid.querySelectorAll('button').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === presetIdx);
  });
}

function prevFilter() {
  if (!manifest) return;
  presetIdx = presetIdx <= -1 ? manifest.presets.length - 1 : presetIdx - 1;
  showOriginal = false; updateView();
}
function nextFilter() {
  if (!manifest) return;
  presetIdx = presetIdx >= manifest.presets.length - 1 ? -1 : presetIdx + 1;
  showOriginal = false; updateView();
}
function prevPhoto() {
  if (!manifest) return;
  imageIdx = (imageIdx - 1 + manifest.images.length) % manifest.images.length;
  showOriginal = false; updateView();
}
function nextPhoto() {
  if (!manifest) return;
  imageIdx = (imageIdx + 1) % manifest.images.length;
  showOriginal = false; updateView();
}
function toggleAB() {
  if (presetIdx < 0) return;
  showOriginal = !showOriginal; updateView();
}

function setupControls() {
  document.getElementById('btn-prev-photo').addEventListener('click', prevPhoto);
  document.getElementById('btn-next-photo').addEventListener('click', nextPhoto);
  document.getElementById('btn-prev-filter').addEventListener('click', prevFilter);
  document.getElementById('btn-next-filter').addEventListener('click', nextFilter);
  abToggle.addEventListener('click', toggleAB);

  // Triangle = always A/B toggle
  cornerDiv.addEventListener('click', (e) => { e.stopPropagation(); toggleAB(); });

  // Image tap = switch filters (left half prev, right half next)
  mainImg.addEventListener('click', (e) => {
    const rect = mainImg.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if (x < rect.width / 2) { prevFilter(); } else { nextFilter(); }
  });

  // Touch swipe on main area: left/right = filter, up/down = photo
  let sx = 0, sy = 0, swiped = false;
  const main = document.getElementById('main');
  main.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    swiped = false;
  }, { passive: true });
  main.addEventListener('touchmove', e => {
    if (swiped || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - sx;
    const dy = e.touches[0].clientY - sy;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (ax > 40 && ax > ay * 1.5) {
      swiped = true;
      dx < 0 ? nextFilter() : prevFilter();
    } else if (ay > 40 && ay > ax * 1.5) {
      swiped = true;
      dy < 0 ? nextPhoto() : prevPhoto();
    }
  }, { passive: true });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (!manifest) return;
    switch (e.key) {
      case 'ArrowLeft': prevFilter(); e.preventDefault(); break;
      case 'ArrowRight': nextFilter(); e.preventDefault(); break;
      case 'ArrowUp': prevPhoto(); e.preventDefault(); break;
      case 'ArrowDown': nextPhoto(); e.preventDefault(); break;
      case ' ': toggleAB(); e.preventDefault(); break;
      default:
        if (e.key >= '0' && e.key <= '9') {
          const i = parseInt(e.key) - 1;
          if (i < manifest.presets.length) { presetIdx = i; showOriginal = false; updateView(); }
          e.preventDefault();
        }
    }
  });
}

init();
</script>
</body>
</html>
