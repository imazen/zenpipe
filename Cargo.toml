[package]
name = "zencodecs"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "AGPL-3.0-or-later"
description = "Unified image codec abstraction over zenjpeg, zenwebp, zengif, zenavif, png, and ravif"
categories = ["multimedia::images"]
keywords = ["image", "codec", "jpeg", "webp", "avif"]
repository = "https://github.com/imazen/zencodecs"

[dependencies]
# Core (always available)
enough = "0.4"
whereat = "0.1"
thiserror = { version = "2.0", default-features = false }
rgb = { version = "0.8", default-features = false, features = ["as-bytes"] }
imgref = "1.12"
bytemuck = { version = "1.25", default-features = false, features = ["extern_crate_alloc"] }
zencodec-types = { path = "/home/lilith/work/zencodec-types/.claude/worktrees/cleanup-phase1" }
linear-srgb = { version = "0.5.5", default-features = false }

# Codecs (all optional, feature-gated)
zenjpeg = { path = "/home/lilith/work/zenjpeg/.claude/worktrees/cleanup-phase1/zenjpeg", optional = true, features = ["decoder", "zencodec"] }
zenwebp = { path = "/home/lilith/work/zenwebp/.claude/worktrees/cleanup-phase1", optional = true }
zengif = { path = "/home/lilith/work/zengif/.claude/worktrees/cleanup-phase1", optional = true }
zenavif = { path = "/home/lilith/work/zenavif/.claude/worktrees/cleanup-phase1", optional = true }
# Deferred from cleanup-phase1 (actively being edited):
# zenpng = { path = "/home/lilith/work/zenpng", optional = true }
# zenjxl = { path = "/home/lilith/work/zenjxl", optional = true, default-features = false }

# Pipeline (optional, feature-gated)
zenresize = { path = "/home/lilith/work/zenresize", optional = true, default-features = false, features = ["std", "layout"] }

# Color management (optional)
# moxcms = { version = "0.8", optional = true, default-features = false }  # Disabled for now

[dev-dependencies]
png = "0.18"

[features]
default = ["jpeg", "webp", "gif", "gif-quantizr"]
std = []

# Individual codec features
jpeg = ["dep:zenjpeg"]
webp = ["dep:zenwebp"]
gif = ["dep:zengif"]
gif-quantizr = ["gif", "zengif/quantizr"]
gif-imagequant = ["gif", "zengif/imagequant"]
# Deferred from cleanup-phase1:
# png = ["dep:zenpng"]
avif-decode = ["dep:zenavif"]
avif-encode = ["dep:zenavif", "zenavif/encode"]
# jxl-decode = ["dep:zenjxl", "zenjxl/decode"]
# jxl-encode = ["dep:zenjxl", "zenjxl/encode"]

# Pipeline
pipeline = ["dep:zenresize"]

# Color management
moxcms = []  # Disabled for now

# All codecs (cleanup-phase1: png and jxl deferred)
all = ["jpeg", "webp", "gif", "gif-quantizr", "avif-decode", "avif-encode"]

[[example]]
name = "metadata_roundtrip"
required-features = ["all", "std"]

[[example]]
name = "gainmap_roundtrip"
required-features = ["all", "std"]

[[example]]
name = "icc_roundtrip"
required-features = ["all", "std"]

[[example]]
name = "wasm_roundtrip"
required-features = ["std"]

[[example]]
name = "bench_wasm"
required-features = ["std"]
