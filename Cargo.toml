[package]
name = "zenpipe"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "AGPL-3.0-or-later"
description = "Streaming pixel pipeline — zero-materialization graph execution over zen crates"
repository = "https://github.com/imazen/zenpipe"
keywords = ["image", "pipeline", "streaming", "scanline"]
categories = ["graphics", "multimedia::images"]

[dependencies]
# Streaming resize (V-first, row push/pull, ring buffer)
zenresize = { path = "../zenresize", features = ["std", "layout"] }
# Pixel format descriptors and row-level conversion (transfer functions, gamut matrices, alpha, CMS)
zenpixels-convert = { path = "../zenpixels/zenpixels-convert", features = ["std", "cms-moxcms"] }
# Pixel buffer types, ColorContext, ICC/CICP metadata
zenpixels = { path = "../zenpixels/zenpixels" }
# Codec trait abstraction (decode/encode, animation, streaming)
zencodec = { path = "../zencodec" }
# Photo filters on planar Oklab f32 (SIMD-accelerated)
zenfilters = { path = "../zenfilters" }
# ICC color management (SIMD-accelerated, pure Rust)
moxcms = "0.8"
# Cooperative cancellation
enough = "0.4"
# f32 ↔ u8 reinterpretation
bytemuck = { version = "1", features = ["derive"] }
# HashMap for graph compilation
hashbrown = "0.15"

[dev-dependencies]
zenjpeg = { path = "../zenjpeg/zenjpeg", features = ["zencodec"] }
zengif = { path = "../zengif", features = ["zencodec", "quantizr"] }
