[package]
name = "zenfilters"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
license = "AGPL-3.0-only OR LicenseRef-Imazen-Commercial"
description = "Photo filter operations on planar Oklab f32 data with SIMD acceleration"
repository = "https://github.com/imazen/zenfilters"
keywords = ["image", "filter", "oklab", "simd", "photo"]
categories = ["multimedia::images", "graphics"]

[features]
default = []
experimental = []
serde = ["dep:serde", "dep:serde-big-array"]
srgb-filters = ["dep:rgb", "zenpixels/rgb"]
zennode = ["dep:zennode"]

[dependencies]
archmage = { version = "0.9.14", features = ["avx512"] }
serde = { version = "1", default-features = false, features = ["derive", "alloc"], optional = true }
serde-big-array = { version = "0.5.1", optional = true }
bytemuck = { version = "1.21", default-features = false, features = ["extern_crate_alloc"] }
linear-srgb = "0.6.5"
magetypes = "0.9.14"
rgb = { version = "0.8", default-features = false, features = ["bytemuck"], optional = true }
zenpixels = { version = "0.2.0", features = ["planar"] }
whereat = "0.1.4"
zennode = { version = "0.1", path = "../zennode/zennode", default-features = false, features = ["derive"], optional = true }
zenpixels-convert = { version = "0.2.0" }

[dev-dependencies]
imgref = "1.12"
palette = { version = "0.7", default-features = false, features = ["std"] }
rgb = { version = "0.8", default-features = false, features = ["as-bytes"] }
zencodecs = { version = "0.1", path = "../zencodecs", default-features = false, features = ["jpeg", "png"] }
zenraw = { version = "0.1", path = "../zenraw", features = ["rawler", "darktable", "exif", "apple"] }
enough = "0.4"
zenbench = { version = "0.1.2", features = ["criterion-compat"] }
libblur = { version = "0.23", default-features = true }
zenresize = { version = "0.1", path = "../zenresize", default-features = false, features = ["std"] }
zensim = { version = "0.2", path = "../zensim/zensim", default-features = false }
zenpixels = { version = "0.2.0", features = ["planar", "rgb"] }
zenpixels-convert = { version = "0.2.0", features = ["planar"] }

# Keep image only for tests that still need it (reference_validation, quality_validation)
image = "0.25"

[[example]]
name = "blur_bench"
required-features = ["experimental"]

[[example]]
name = "fused_bench"
required-features = ["experimental"]

[[example]]
name = "train_autotune"
required-features = ["experimental"]

[[example]]
name = "compare_autotune"
required-features = ["experimental"]

[[example]]
name = "darktable_parity"
required-features = ["experimental"]

[[example]]
name = "mobile_parity"
required-features = ["experimental"]

[[example]]
name = "perf_probe"
required-features = ["experimental"]

[[example]]
name = "film_look_gallery"
required-features = ["experimental"]

[[test]]
name = "reference_validation"

[[test]]
name = "quality_validation"

[[bench]]
name = "row_batch"
harness = false
required-features = ["srgb-filters"]

[[bench]]
name = "color_grading"
harness = false

[patch.crates-io]
zensim = { path = "../zensim/zensim" }
zencodecs = { path = "../zencodecs" }
zenresize = { path = "../zenresize" }
