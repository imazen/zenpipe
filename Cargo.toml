[package]
name = "zenfilters"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
license = "AGPL-3.0-or-later"
description = "Photo filter operations on planar Oklab f32 data with SIMD acceleration"
repository = "https://github.com/imazen/zenfilters"
keywords = ["image", "filter", "oklab", "simd", "photo"]
categories = ["multimedia::images", "graphics"]

[features]
default = []
buffer = []
experimental = []
srgb-filters = ["buffer", "dep:rgb"]

[dependencies]
archmage = { version = "0.9.5", features = ["avx512"] }
bytemuck = { version = "1.21", default-features = false, features = ["extern_crate_alloc"] }
linear-srgb = "0.6.3"
magetypes = "0.9.4"
rgb = { version = "0.8", default-features = false, features = ["bytemuck"], optional = true }
zenpixels = { version = "0.1", path = "../zenpixels/zenpixels", features = ["planar"] }
whereat = { version = "0.1.3", path = "../whereat" }
zenpixels-convert = { version = "0.1", path = "../zenpixels/zenpixels-convert" }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
image = "0.25"
imageproc = "0.26"
palette = { version = "0.7", default-features = false, features = ["std"] }
zenraw = { version = "0.1", path = "../zenraw", features = ["darktable"] }
zensim = { version = "0.2", path = "../zensim/zensim", default-features = false }
zenpixels = { version = "0.1", path = "../zenpixels/zenpixels", features = ["planar", "rgb"] }
zenpixels-convert = { version = "0.1", path = "../zenpixels/zenpixels-convert", features = ["planar"] }

[[example]]
name = "train_autotune"
required-features = ["experimental"]

[[example]]
name = "compare_autotune"
required-features = ["experimental"]

[[example]]
name = "darktable_parity"
required-features = ["experimental"]

[[test]]
name = "reference_validation"
required-features = ["buffer"]

[[test]]
name = "quality_validation"
required-features = ["buffer"]

[[bench]]
name = "row_batch"
harness = false
required-features = ["srgb-filters"]

[patch.crates-io]
zenpixels = { path = "../zenpixels/zenpixels" }
zensim = { path = "../zensim/zensim" }
whereat = { path = "../whereat" }
