[package]
name = "zenpipe"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "AGPL-3.0-only OR LicenseRef-Imazen-Commercial"
description = "Streaming pixel pipeline — zero-materialization graph execution over zen crates"
repository = "https://github.com/imazen/zenpipe"
keywords = ["image", "pipeline", "streaming", "scanline"]
categories = ["graphics", "multimedia::images"]

[features]
default = ["std"]
# Enables zenfilters, moxcms ICC CMS, and std on all deps.
# Without this feature, the core pipeline still works (resize, blend, codec,
# animation, format conversion) in a no_std + alloc environment.
std = [
    "zenresize/std",
    "zenpixels-convert/std",
    "zenpixels-convert/cms-moxcms",
    "enough/std",
    "dep:zenfilters",
    "dep:moxcms",
]
# Bridge from zennode NodeInstance to PipelineGraph NodeOps.
zennode = ["dep:zennode", "zenresize/layout"]

# ── Node registry features ──
# Each enables that crate's zennode_defs::register() in full_registry().
nodes-jpeg = ["zennode", "dep:zenjpeg"]
nodes-png = ["zennode", "dep:zenpng"]
nodes-webp = ["zennode", "dep:zenwebp"]
nodes-gif = ["zennode", "dep:zengif"]
nodes-avif = ["zennode", "dep:zenavif"]
nodes-jxl = ["zennode", "dep:zenjxl"]
nodes-tiff = ["zennode", "dep:zentiff"]
nodes-bmp = ["zennode", "dep:zenbitmaps"]
# Geometry and resize nodes now live in zenpipe's own zennode_defs.
# These features are kept as backward-compatible aliases.
nodes-resize = ["zennode"]
nodes-layout = ["zennode"]
nodes-quant = ["zennode", "dep:zenquant"]
nodes-filters = ["zennode", "std", "zenfilters/zennode"]
nodes-faces = ["zennode", "std", "dep:zensally", "dep:zensally-zentract"]
nodes-all = [
    "nodes-jpeg", "nodes-png", "nodes-webp", "nodes-gif",
    "nodes-avif", "nodes-jxl", "nodes-tiff", "nodes-bmp",
    "nodes-resize", "nodes-layout", "nodes-quant", "nodes-filters",
]

[dependencies]
# Streaming resize (V-first, row push/pull, ring buffer)
zenresize = { path = "../zenresize", default-features = false, features = ["layout"] }
# Blend modes on premultiplied linear f32 RGBA rows (SIMD-accelerated)
zenblend = { path = "../zenblend", default-features = false }
# Pixel format descriptors and row-level conversion (transfer functions, gamut matrices, alpha)
zenpixels-convert = { version = "0.2.1", default-features = false }
# Pixel buffer types, ColorContext, ICC/CICP metadata
zenpixels = { version = "0.2.1", default-features = false }
# Codec trait abstraction (decode/encode, animation, streaming)
zencodec = { version = "0.1.5", default-features = false }
# Cooperative cancellation
enough = { version = "0.4", default-features = false }
# Error location tracking (re-exported by zenpixels for BufferError)
whereat = { version = "0.1.4", default-features = false }
# Linear ↔ sRGB color space conversion (LUT-based, no_std)
linear-srgb = { path = "../linear-srgb", default-features = false }
# f32 ↔ u8 reinterpretation
bytemuck = { version = "1", features = ["derive"] }
# HashMap for graph compilation
hashbrown = "0.15"
# Photo filters on planar Oklab f32 (SIMD-accelerated) — requires std
zenfilters = { path = "../zenfilters", optional = true }
# ICC color management (SIMD-accelerated, pure Rust) — requires std
moxcms = { version = "0.8", optional = true }
# Self-documenting node definitions — bridges zennode types into PipelineGraph
zennode = { path = "../zennode/zennode", default-features = false, features = ["derive"], optional = true }

# ── Optional codec crates for node registry ──
zenjpeg = { path = "../zenjpeg/zenjpeg", default-features = false, features = ["zencodec", "zennode"], optional = true }
zenpng = { path = "../zenpng", default-features = false, features = ["zencodec", "zennode"], optional = true }
zenwebp = { path = "../zenwebp", default-features = false, features = ["zencodec", "zennode"], optional = true }
zengif = { path = "../zengif", default-features = false, features = ["zencodec", "zennode"], optional = true }
zenavif = { path = "../zenavif", default-features = false, features = ["zencodec", "zennode"], optional = true }
zenjxl = { path = "../zenjxl", default-features = false, features = ["zencodec", "zennode"], optional = true }
zentiff = { path = "../zentiff", default-features = false, features = ["zennode"], optional = true }
zenbitmaps = { path = "../zenbitmaps", default-features = false, features = ["zennode"], optional = true }
zenquant = { path = "../zenquant", default-features = false, features = ["zennode"], optional = true }
# Face detection + saliency via zentract plugin (optional)
zensally = { path = "../zenfaces/crates/zensally", default-features = false, features = ["zenlayout", "serde"], optional = true }
zensally-zentract = { path = "../zenfaces/crates/zensally-zentract", default-features = false, features = ["analyzer"], optional = true }

[dev-dependencies]
# Dev-deps enable extra features on the optional codec crates above.
# zenjpeg and zengif are used in integration tests (streaming_codec, bridge_codec).
zenjpeg = { path = "../zenjpeg/zenjpeg", features = ["zencodec"] }
zengif = { path = "../zengif", features = ["zencodec", "quantizr"] }
zennode = { path = "../zennode/zennode", features = ["derive"] }
