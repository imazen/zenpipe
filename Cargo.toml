[package]
name = "zenlayout"
version = "0.2.1"
edition = "2024"
rust-version = "1.89"
license = "AGPL-3.0-only OR LicenseRef-Imazen-Commercial"
description = "Image layout computation with constraint modes, orientation, and decoder negotiation"
repository = "https://github.com/imazen/zenlayout"
keywords = ["image", "layout", "resize", "crop", "orientation"]
categories = ["graphics", "multimedia::images", "no-std"]

[features]
default = ["std"]
std = ["alloc"]
alloc = []
svg = ["std"]
riapi = ["alloc"]
smart-crop = ["alloc"]
# zennode = ["dep:zennode", "alloc"]

[dependencies]
whereat = { version = "0.1.5", default-features = false }
# zennode = { path = "../zennode/zennode", default-features = false, features = ["derive"], optional = true }
